<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Recovery | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #ffffff; /* Pure White Background */
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .recovery-box {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 25px;
            border-radius: 20px;
            text-align: center;
            /* Light shadow to make it pop off the white background */
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
        }

        .mochearn-logo { width: 130px; margin-bottom: 20px; }
        
        .icon-shield { 
            font-size: 2.5rem; 
            margin-bottom: 15px; 
            display: block; 
            color: #004d40; 
        }

        h2 { 
            font-family: 'Montserrat', sans-serif; 
            color: #333; 
            font-size: 1.3rem;
            margin-bottom: 10px; 
            text-transform: uppercase; 
        }

        p { color: #777; font-size: 0.9rem; margin-bottom: 30px; line-height: 1.5; }

        .input-container { text-align: left; margin-bottom: 25px; }
        
        .input-container label { 
            color: #004d40; 
            font-size: 0.75rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            display: block; 
        }

        input { 
            width: 100%; 
            background: #f9f9f9; 
            border: 1px solid #eee; 
            padding: 16px; 
            border-radius: 12px; 
            color: #333; 
            outline: none; 
            font-size: 1rem;
        }
        
        input:focus { border-color: #00ff88; background: #fff; }

        .btn-request { 
            width: 100%; 
            background: #004d40; /* Dark Professional Green */
            color: #fff; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.3s;
        }

        /* THE CHOICE POP-UP */
        #loginPopup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .popup-card {
            background: #fff;
            padding: 35px 25px;
            border-radius: 20px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .choice-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border-radius: 10px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-catalyst { background: #0088cc; color: white; }
        .btn-vendor { background: #00ff88; color: #004d40; }

        .footer-nav a { 
            color: #004d40; 
            text-decoration: none; 
            font-size: 0.85rem; 
            margin-top: 25px; 
            display: inline-block; 
            font-weight: bold; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="recovery-box">
        <img src="your-logo-link.png" alt="Logo" class="mochearn-logo">
        <span class="icon-shield">🛡️</span>
        <h2>Access Recovery</h2>
        <p>Confirm your registered email to receive an encrypted password reset link.</p>
        
        <form id="requestForm">
            <div class="input-container">
                <label>Verified Email</label>
                <input type="email" id="userEmail" placeholder="Enter your email" required>
            </div>
            <button type="submit" id="authBtn" class="btn-request">Authorize Reset 🚀</button>
        </form>

        <div class="footer-nav">
            <a onclick="showPopup()">← Return to Login</a>
        </div>
    </div>

    <div id="loginPopup">
        <div class="popup-card">
            <h2 style="font-size: 1rem; margin-bottom: 20px;">Choose Your Gateway</h2>
            <a href="login.html" class="choice-btn btn-catalyst">Catalyst Login</a>
            <a href="Venders login.html" class="choice-btn btn-vendor">Vendor Login</a>
            <div style="font-size: 0.8rem; color: #999; cursor: pointer; margin-top: 10px;" onclick="hidePopup()">Cancel</div>
        </div>
    </div>

    <script>
        function showPopup() { document.getElementById('loginPopup').style.display = 'flex'; }
        function hidePopup() { document.getElementById('loginPopup').style.display = 'none'; }
        
        document.getElementById('requestForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 1. Show the pop-up/alert message
            alert("Verification link dispatched to your inbox!");
            
            // 2. Change the button after they tap "OK"
            const btn = document.getElementById('authBtn');
            btn.innerHTML = "CHECK YOUR MAIL BOX ✅";
            btn.style.background = "#00ff88"; // Turn green to show success
            btn.style.color = "#004d40";
            
            // Disable input so they don't keep clicking
            document.getElementById('userEmail').disabled = true;
        });
    </script>

</body>
    </html>
