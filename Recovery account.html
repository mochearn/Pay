<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Security Key | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #ffffff; 
            font-family: 'Arial', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }

        .reset-box {
            background: #ffffff; width: 100%; max-width: 400px;
            padding: 40px 25px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid #f0f0f0;
        }

        .mochearn-logo { width: 120px; margin-bottom: 20px; }
        h2 { font-family: 'Montserrat', sans-serif; color: #333; font-size: 1.3rem; margin-bottom: 10px; text-transform: uppercase; }
        
        /* DYNAMIC GUIDANCE TEXT */
        #guidance-text { color: #004d40; font-size: 0.85rem; font-weight: bold; margin-bottom: 20px; min-height: 1.2rem; }

        .form-group { text-align: left; margin-bottom: 20px; position: relative; }
        label { color: #444; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        input { width: 100%; background: #f9f9f9; border: 1px solid #eee; padding: 16px; padding-right: 50px; border-radius: 12px; color: #333; outline: none; font-size: 1rem; transition: 0.3s; }
        input:disabled { opacity: 0.6; cursor: not-allowed; }

        .eye-btn { position: absolute; right: 15px; background: none; border: none; cursor: pointer; color: #999; }
        .eye-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* CHECKLIST STYLING */
        .requirements { text-align: left; margin-bottom: 25px; padding: 15px; background: #fcfcfc; border-radius: 12px; border: 1px solid #f0f0f0; }
        .req-item { font-size: 0.8rem; color: #333; /* Dark/Black by default */ margin-bottom: 8px; display: flex; align-items: center; gap: 10px; transition: 0.3s; opacity: 0.4; }
        .req-item.valid { color: #008f52; opacity: 1; font-weight: bold; }
        .req-item.valid::before { content: '●'; color: #00ff88; }
        .req-item::before { content: '○'; }

        /* LOCKED BUTTON STATE */
        .btn-update { 
            width: 100%; background: #222; /* Dark/Locked color */
            color: #fff; border: none; padding: 18px; border-radius: 12px; 
            font-family: 'Montserrat', sans-serif; font-weight: 800; 
            text-transform: uppercase; cursor: not-allowed; opacity: 0.5;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.4s;
        }

        .btn-update.active { background: #004d40; cursor: pointer; opacity: 1; box-shadow: 0 10px 20px rgba(0,77,64,0.2); }

        .spinner { display: none; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #match-error { color: #ff4444; font-size: 0.75rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="reset-box">
        <img src="your-logo-link.png" alt="Logo" class="mochearn-logo">
        <h2>Security Key Reset</h2>
        <div id="guidance-text">Start typing your new password...</div>
        
        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="newPass" placeholder="Enter new key" required>
                    <button type="button" class="eye-btn" onclick="togglePass('newPass', this)">
                        <svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </button>
                </div>
            </div>

            <div class="requirements">
                <div id="req-letter" class="req-item">Includes Letters</div>
                <div id="req-number" class="req-item">Includes Numbers</div>
                <div id="req-symbol" class="req-item">Includes Symbols (@, #, $)</div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPass" placeholder="Repeat key" required disabled>
            </div>

            <button type="submit" id="updateBtn" class="btn-update" disabled>
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Update Key</span>
            </button>
            <div id="match-error">Passwords do not match!</div>
        </form>
    </div>

    <script>
        const newPass = document.getElementById('newPass');
        const confirmPass = document.getElementById('confirmPass');
        const updateBtn = document.getElementById('updateBtn');
        const guidance = document.getElementById('guidance-text');
        
        const reqs = { letter: /[a-zA-Z]/, number: /[0-9]/, symbol: /[^a-zA-Z0-9]/ };

        newPass.addEventListener('input', () => {
            const val = newPass.value;
            const hasLetter = reqs.letter.test(val);
            const hasNumber = reqs.number.test(val);
            const hasSymbol = reqs.symbol.test(val);

            // Mark Words Green or Keep Dark/Grey
            document.getElementById('req-letter').className = hasLetter ? 'req-item valid' : 'req-item';
            document.getElementById('req-number').className = hasNumber ? 'req-item valid' : 'req-item';
            document.getElementById('req-symbol').className = hasSymbol ? 'req-item valid' : 'req-item';

            // Guidance Logic
            if (!hasLetter) { guidance.innerText = "👉 Add at least one letter"; }
            else if (!hasNumber) { guidance.innerText = "👉 Now add a number"; }
            else if (!hasSymbol) { guidance.innerText = "👉 Almost there! Add a symbol (@, #)"; }
            else { 
                guidance.innerText = "✅ Strong Password! Now confirm it below."; 
                confirmPass.disabled = false;
                confirmPass.style.background = "#fff";
                confirmPass.style.border = "1px solid #00ff88";
            }

            checkFullValidation();
        });

        confirmPass.addEventListener('input', checkFullValidation);

        function checkFullValidation() {
            const val = newPass.value;
            const allValid = reqs.letter.test(val) && reqs.number.test(val) && reqs.symbol.test(val);
            const match = val === confirmPass.value && confirmPass.value !== "";

            if (allValid && match) {
                updateBtn.disabled = false;
                updateBtn.classList.add('active');
                updateBtn.innerHTML = "Update Password 🚀";
            } else {
                updateBtn.disabled = true;
                updateBtn.classList.remove('active');
            }
        }

        function togglePass(id, btn) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        }

        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('btnSpinner').style.display = 'block';
            const btnText = document.getElementById('btnText');
            updateBtn.style.background = "#008f52";
            updateBtn.disabled = true;
            
            setTimeout(() => {
                window.location.href = "login.html"; 
            }, 3000);
        });
    </script>
</body>
            </html>
