<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Recovery | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(135deg, #050a30 0%, #004d40 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .recovery-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .mochearn-logo { width: 140px; margin-bottom: 15px; }
        .icon-shield { font-size: 2.5rem; margin-bottom: 15px; display: block; }
        h2 { font-family: 'Montserrat', sans-serif; color: #fff; margin-bottom: 10px; text-transform: uppercase; }
        p { color: #aaa; font-size: 0.9rem; margin-bottom: 30px; }

        .input-container { text-align: left; margin-bottom: 25px; }
        .input-container label { color: #00ff88; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; }
        input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); padding: 16px; border-radius: 12px; color: #fff; outline: none; }
        
        .btn-request { width: 100%; background: #fff; color: #050a30; border: none; padding: 18px; border-radius: 15px; font-family: 'Montserrat', sans-serif; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .btn-request:hover { background: #00ff88; }

        /* THE POP-UP OVERLAY */
        #loginPopup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .popup-card {
            background: rgba(255,255,255,0.1);
            padding: 40px 30px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .choice-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn-catalyst { background: #0088cc; color: white; }
        .btn-vendor { background: #00ff88; color: #050a30; }

        .close-btn { color: #aaa; font-size: 0.8rem; cursor: pointer; text-decoration: underline; }

        .footer-nav a { color: #00ff88; text-decoration: none; font-size: 0.8rem; margin-top: 25px; display: inline-block; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="recovery-box">
        <img src="your-logo-link.png" alt="Logo" class="mochearn-logo">
        <span class="icon-shield">🛡️</span>
        <h2>Access Recovery</h2>
        <p>Confirm your registered email to receive an encrypted password reset link.</p>
        
        <form id="requestForm">
            <div class="input-container">
                <label>Verified Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn-request">Authorize Reset 🚀</button>
        </form>

        <div class="footer-nav">
            <a onclick="showPopup()">← Return to Login</a>
        </div>
    </div>

    <div id="loginPopup">
        <div class="popup-card">
            <h2 style="font-size: 1.1rem; margin-bottom: 20px;">Choose Your Gateway</h2>
            
            <a href="catalyst-login.html" class="choice-btn btn-catalyst">Catalyst Login</a>
            <a href="vendor-login.html" class="choice-btn btn-vendor">Vendor Login</a>
            
            <div class="close-btn" onclick="hidePopup()">Cancel</div>
        </div>
    </div>

    <script>
        function showPopup() { document.getElementById('loginPopup').style.display = 'flex'; }
        function hidePopup() { document.getElementById('loginPopup').style.display = 'none'; }
        
        document.getElementById('requestForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Verification link dispatched to your inbox!");
        });
    </script>

</body>
    </html>
