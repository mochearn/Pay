<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Account | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #00ff88; /* Matching the vibrant green background from your screenshot */
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .recovery-card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            color: #333;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            color: #333;
        }

        input:focus {
            border-color: #00ff88;
        }

        .btn-reset {
            width: 100%;
            background: #00ff88;
            color: #ffffff;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s;
        }

        .btn-reset:active {
            transform: scale(0.95);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #333;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* SUCCESS MESSAGE HIDDEN BY DEFAULT */
        #success-msg {
            display: none;
            color: #008f52;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="recovery-card">
        <h2>RECOVER ACCESS</h2>
        <p>Enter your registered email below and we will send you a secure link to reset your password.</p>
        
        <form id="recoveryForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="merchant@mochearn.com" required>
            </div>
            
            <button type="submit" class="btn-reset">SEND RESET LINK 🚀</button>
        </form>

        <div id="success-msg">📩 Check your inbox for the recovery link!</div>

        <a href="login.html" class="back-link">Back to Login</a>
    </div>

    <script>
        document.getElementById('recoveryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // SHOW SUCCESS MESSAGE
            document.getElementById('success-msg').style.display = 'block';
            this.style.display = 'none';
        });
    </script>

</body>
  </html>
