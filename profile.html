<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn | Profile Settings</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* THE BLACK SUCCESS TOAST */
        #success-toast {
            position: fixed;
            top: -100px; /* Hidden at start */
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 300px;
            background: rgba(0, 0, 0, 0.4); /* Black with 40% opacity */
            backdrop-filter: blur(8px);
            color: white;
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 1000;
            transition: top 0.5s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* SVG CIRCLE FIX */
        #profile-preview-circle {
            width: 110px;
            height: 110px;
            background: #0084ff11;
            color: #0084ff;
            border-radius: 50%;
            border: 3px solid #0084ff;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 900;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1 !important;
        }

        #profile-image-display {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* Hidden until user uploads a photo */
        }

        /* EDIT ICON OVERLAY */
        .edit-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0, 132, 255, 0.7);
            color: white;
            font-size: 10px;
            padding: 4px 0;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="success-toast">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span style="font-weight: 700; font-size: 15px;">Changes Saved</span>
    </div>

    <div id="profile-room" style="padding: 40px 20px; text-align: center; min-height: 100vh;">
        
        <div style="text-align: left; max-width: 400px; margin: 0 auto 30px auto;">
            <a href="#" style="text-decoration: none; color: #0084ff; font-size: 14px; font-weight: 700;">
                ← Back
            </a>
        </div>

        <h2 style="font-weight: 800; color: #1a1a1a; margin-bottom: 30px; letter-spacing: -1px;">Profile Settings</h2>

        <div id="profile-preview-circle" onclick="document.getElementById('photo-input').click()">
            <span id="preview-initials">VP</span>
            <img id="profile-image-display" src="" alt="Profile">
            <div class="edit-overlay">Edit</div>
        </div>

        <input type="file" id="photo-input" accept="image/*" style="display: none;" onchange="handlePhotoUpload(this)">

        <p style="color: #0084ff; font-weight: 700; font-size: 13px; margin-bottom: 40px;">
            Tap photo to change
        </p>

        <div style="text-align: left; max-width: 400px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; border: 1px solid #eee;">
            <label style="font-size: 11px; color: #aaa; font-weight: 800; display: block; margin-bottom: 10px; letter-spacing: 1px;">FULL NAME</label>
            
            <input type="text" id="edit-fullname" placeholder="Enter your name" style="
                width: 100%; padding: 15px; 
                border: 2px solid #f0f0f0; border-radius: 12px; 
                font-size: 16px; font-weight: 600; color: #1a1a1a;
                outline: none; box-sizing: border-box;
                background: #fafafa;
            ">
            
            <button onclick="saveProfileChanges()" style="
                width: 100%; background: #0084ff; color: #fff; 
                padding: 18px; border: none; border-radius: 15px; 
                font-size: 16px; font-weight: 800; margin-top: 30px;
                cursor: pointer; box-shadow: 0 8px 20px rgba(0, 132, 255, 0.2);
            ">
                Save Changes
            </button>
        </div>
    </div>

    <script>
        // LOAD DATA
        window.onload = function() {
            const currentName = localStorage.getItem('mochearn_user') || "Valued Partner";
            const currentPhoto = localStorage.getItem('mochearn_user_photo');

            document.getElementById('edit-fullname').value = currentName;
            
            if (currentPhoto) {
                const imgDisplay = document.getElementById('profile-image-display');
                imgDisplay.src = currentPhoto;
                imgDisplay.style.display = 'block';
                document.getElementById('preview-initials').style.display = 'none';
            } else {
                updatePreview(currentName);
            }
        };

        // REAL-TIME INITIALS
        document.getElementById('edit-fullname').oninput = function() {
            updatePreview(this.value);
        };

        function updatePreview(name) {
            const parts = name.trim().split(' ');
            let initials = parts[0] ? parts[0][0] : "?";
            if (parts.length >= 2 && parts[1][0]) {
                initials += parts[1][0];
            }
            document.getElementById('preview-initials').innerText = initials.toUpperCase();
        }

        // PHOTO UPLOAD LOGIC
        function handlePhotoUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgDisplay = document.getElementById('profile-image-display');
                    imgDisplay.src = e.target.result;
                    imgDisplay.style.display = 'block';
                    document.getElementById('preview-initials').style.display = 'none';
                    
                    // Save photo to brain immediately
                    localStorage.setItem('mochearn_user_photo', e.target.result);
                };
                reader.readAsDataURL(file);
            }
        }

        // SAVE LOGIC WITH TOAST
        function saveProfileChanges() {
            const newName = document.getElementById('edit-fullname').value;
            if(newName.trim() === "") return;

            localStorage.setItem('mochearn_user', newName);

            // SHOW BLACK TOAST
            const toast = document.getElementById('success-toast');
            toast.style.top = '40px';

            // HIDE AND REDIRECT
            setTimeout(() => {
                toast.style.top = '-100px';
                setTimeout(() => {
                    window.location.href = "#"; // Replace with dashboard link later
                }, 500);
            }, 2000);
        }
    </script>
</body>
    </html>
