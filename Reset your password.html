<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Security Key | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #ffffff; 
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .reset-box {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
        }

        .mochearn-logo { width: 120px; margin-bottom: 20px; }
        
        h2 { 
            font-family: 'Montserrat', sans-serif; 
            color: #333; 
            font-size: 1.3rem;
            margin-bottom: 10px; 
            text-transform: uppercase; 
        }

        p { color: #777; font-size: 0.9rem; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        
        label { 
            color: #004d40; 
            font-size: 0.75rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            display: block; 
        }

        input { 
            width: 100%; 
            background: #f9f9f9; 
            border: 1px solid #eee; 
            padding: 16px; 
            border-radius: 12px; 
            color: #333; 
            outline: none; 
            font-size: 1rem;
        }
        
        input:focus { border-color: #00ff88; background: #fff; }

        .btn-update { 
            width: 100%; 
            background: #004d40; 
            color: #fff; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            margin-top: 10px;
        }

        .btn-update:active { transform: scale(0.98); }

        #match-error {
            color: #ff4444;
            font-size: 0.75rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="reset-box">
        <img src="your-logo-link.png" alt="Logo" class="mochearn-logo">
        <h2>Set New Password</h2>
        <p>Create a secure security key to regain access to your vault.</p>
        
        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPass" placeholder="........" required>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPass" placeholder="........" required>
            </div>

            <button type="submit" id="updateBtn" class="btn-update">Update Password 🚀</button>
            <div id="match-error">Passwords do not match! Please try again.</div>
        </form>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const pass1 = document.getElementById('newPass').value;
            const pass2 = document.getElementById('confirmPass').value;
            const error = document.getElementById('match-error');
            const btn = document.getElementById('updateBtn');

            if (pass1 !== pass2) {
                error.style.display = 'block';
                return;
            }

            error.style.display = 'none';
            alert("Success! Your password has been updated.");
            
            // Change button text to guide them back
            btn.innerHTML = "REDIRECTING TO LOGIN...";
            btn.style.background = "#00ff88";
            btn.style.color = "#004d40";

            // Redirect back to login after 2 seconds
            setTimeout(() => {
                window.location.href = "login.html"; 
            }, 2000);
        });
    </script>

</body>
  </html>
