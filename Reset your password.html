<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Reset | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; font-family: 'Arial', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .reset-box { background: #ffffff; width: 100%; max-width: 400px; padding: 40px 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid #f0f0f0; }
        .mochearn-logo { width: 120px; margin-bottom: 20px; }
        h2 { font-family: 'Montserrat', sans-serif; color: #333; font-size: 1.3rem; margin-bottom: 10px; text-transform: uppercase; }
        #guidance-text { color: #004d40; font-size: 0.82rem; font-weight: bold; margin-bottom: 20px; min-height: 1.2rem; }

        .form-group { text-align: left; margin-bottom: 18px; }
        label { color: #444; font-size: 0.72rem; font-weight: bold; text-transform: uppercase; margin-bottom: 6px; display: block; }
        
        select, input { width: 100%; background: #f9f9f9; border: 1px solid #eee; padding: 15px; border-radius: 12px; color: #333; outline: none; font-size: 1rem; transition: 0.3s; }
        input:focus, select:focus { border-color: #00ff88; background: #fff; }
        
        /* Error state for mismatch */
        input.error { border-color: #ff4444 !important; background: #fff0f0; }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .eye-btn { position: absolute; right: 15px; background: none; border: none; cursor: pointer; color: #999; }
        .eye-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }

        .requirements { text-align: left; margin-bottom: 20px; padding: 12px; background: #fcfcfc; border-radius: 12px; border: 1px solid #f0f0f0; }
        .req-item { font-size: 0.75rem; color: #333; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; opacity: 0.3; transition: 0.3s; }
        .req-item.valid { color: #008f52; opacity: 1; font-weight: bold; }
        .req-item.valid::before { content: '✓'; color: #00ff88; }
        .req-item::before { content: '○'; }

        .btn-update { width: 100%; background: #222; color: #fff; border: none; padding: 18px; border-radius: 12px; font-family: 'Montserrat', sans-serif; font-weight: 800; text-transform: uppercase; cursor: not-allowed; opacity: 0.5; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.4s; }
        .btn-update.active { background: #004d40; cursor: pointer; opacity: 1; }

        .spinner { display: none; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="reset-box">
        <img src="your-logo-link.png" alt="Logo" class="mochearn-logo">
        <h2>Security Update</h2>
        <div id="guidance-text">Select account type to begin...</div>
        
        <form id="resetForm">
            <div class="form-group">
                <label>Account Category</label>
                <select id="accountType" required>
                    <option value="" disabled selected>-- Choose Account --</option>
                    <option value="catalyst">Catalyst Member</option>
                    <option value="vendor">Mochearn Vendor</option>
                </select>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="newPass" placeholder="Min. 10 characters" required disabled>
                    <button type="button" class="eye-btn" onclick="togglePass('newPass')">
                        <svg id="eyeSvg" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </button>
                </div>
            </div>

            <div class="requirements">
                <div id="req-len" class="req-item">At least 10 Characters</div>
                <div id="req-letter" class="req-item">Includes Letters</div>
                <div id="req-number" class="req-item">Includes Numbers</div>
                <div id="req-symbol" class="req-item">Includes Symbols (@, #, $)</div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPass" placeholder="Repeat new password" required disabled>
            </div>

            <button type="submit" id="updateBtn" class="btn-update" disabled>
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Update Key</span>
            </button>
        </form>
    </div>

    <script>
        const accountType = document.getElementById('accountType');
        const newPass = document.getElementById('newPass');
        const confirmPass = document.getElementById('confirmPass');
        const updateBtn = document.getElementById('updateBtn');
        const guidance = document.getElementById('guidance-text');
        
        const reqs = { letter: /[a-zA-Z]/, number: /[0-9]/, symbol: /[^a-zA-Z0-9]/ };

        // Enable password only after account selection
        accountType.addEventListener('change', () => {
            newPass.disabled = false;
            guidance.innerText = "👉 Enter a strong 10-character password";
        });

        newPass.addEventListener('input', () => {
            const val = newPass.value;
            const hasLen = val.length >= 10;
            const hasLetter = reqs.letter.test(val);
            const hasNumber = reqs.number.test(val);
            const hasSymbol = reqs.symbol.test(val);

            document.getElementById('req-len').className = hasLen ? 'req-item valid' : 'req-item';
            document.getElementById('req-letter').className = hasLetter ? 'req-item valid' : 'req-item';
            document.getElementById('req-number').className = hasNumber ? 'req-item valid' : 'req-item';
            document.getElementById('req-symbol').className = hasSymbol ? 'req-item valid' : 'req-item';

            if (!hasLen) guidance.innerText = "⚠️ Password too short (Needs 10)";
            else if (!hasLetter) guidance.innerText = "👉 Add a letter";
            else if (!hasNumber) guidance.innerText = "👉 Add a number";
            else if (!hasSymbol) guidance.innerText = "👉 Add a symbol (@, #, $)";
            else {
                guidance.innerText = "✅ Requirements met. Now confirm it.";
                confirmPass.disabled = false;
            }
            validateForm();
        });

        confirmPass.addEventListener('input', () => {
            if (confirmPass.value !== newPass.value) {
                confirmPass.classList.add('error');
            } else {
                confirmPass.classList.remove('error');
            }
            validateForm();
        });

        function validateForm() {
            const isMatch = (newPass.value === confirmPass.value && confirmPass.value !== "");
            const isStrong = newPass.value.length >= 10 && reqs.letter.test(newPass.value) && reqs.number.test(newPass.value) && reqs.symbol.test(newPass.value);
            
            if (isMatch && isStrong) {
                updateBtn.disabled = false;
                updateBtn.classList.add('active');
            } else {
                updateBtn.disabled = true;
                updateBtn.classList.remove('active');
            }
        }

        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        }

        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            document.getElementById('btnSpinner').style.display = 'block';
            const btnText = document.getElementById('btnText');
            updateBtn.style.background = "#008f52";
            updateBtn.disabled = true;
            
            // STAGE 1
            btnText.innerHTML = "UPDATING YOUR PASSWORD...";
            
            setTimeout(() => {
                // STAGE 2
                btnText.innerHTML = "SUCCESS! SECURING VAULT...";
                
                setTimeout(() => {
                    const choice = accountType.value;
                    const destination = choice === 'vendor' ? 'Vendors login.html' : 'login.html';
                    btnText.innerHTML = `REDIRECTING TO ${choice.toUpperCase()}...`;
                    
                    setTimeout(() => {
                        window.location.href = destination;
                    }, 1500);
                }, 1500);
            }, 2000);
        });
    </script>
</body>
    </html>
