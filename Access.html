<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Restricted | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0; 
            background-color: #00ff88; 
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .bridge-card {
            background: #ffffff;
            width: 90%;
            max-width: 420px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .logo-header { background: #050a18; padding: 30px 20px; }
        .logo-placeholder { width: 130px; height: 35px; margin: 0 auto; border: 1px dashed #444; color: #555; display: flex; justify-content: center; align-items: center; font-size: 0.6rem; }

        .content { 
            padding: 40px 25px; 
            display: flex;
            flex-direction: column;
            align-items: center; /* THIS CENTERS EVERYTHING INTERNALLY */
        }
        
        .icon-box { font-size: 3rem; color: #050a18; margin-bottom: 20px; }
        h2 { font-weight: 600; font-size: 1.4rem; color: #333; margin-bottom: 10px; text-transform: uppercase; }
        
        .status-tag {
            display: inline-block;
            background: #fdf2f2;
            color: #ff3e3e;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        p { font-size: 0.85rem; color: #666; line-height: 1.6; margin-bottom: 30px; }

        /* PULSING BUTTON STYLE */
        .cta-btn {
            display: block;
            width: 100%;
            max-width: 320px; /* Limits width to stay centered */
            padding: 16px;
            background: #00ff88;
            color: #050a18;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            animation: pulse-animation 2s infinite; /* THE PULSE */
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(0, 255, 136, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0px rgba(0, 255, 136, 0); }
        }

        .footer-link { margin-top: 30px; font-size: 0.8rem; color: #888; }
        .footer-link a { 
            color: #333; 
            text-decoration: none; 
            font-weight: 600; 
            border-bottom: 1px solid #00ff88;
        }
    </style>
</head>
<body>

    <div class="bridge-card">
        <div class="logo-header">
            <div class="logo-placeholder">YOUR LOGO HERE</div>
        </div>

        <div class="content">
            <div class="icon-box"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="status-tag">ACCESS RESTRICTED</div>
            <h2>The Vault is Locked</h2>
            <p>
                Access to <strong>Mochearn</strong> is exclusive to Catalysts who have secured any <strong>product</strong> license with us. Secure your license first to unlock the portal.
            </p>

            <a href="YOUR_PAYMENT_LINK_HERE" class="cta-btn">Secure My License Now</a>

            <div class="footer-link">
                Already paid? <a href="login.html">login</a>
            </div>
        </div>
    </div>

</body>
    </html>
