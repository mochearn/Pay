<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBF | Elite Wealth Migration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow-x: hidden; font-family: sans-serif; }

        :root {
            --bureau-blue: #001f3f;
            --action-green: #00c853;
            --emergency-red: #FF4136;
        }

        /* STATUS BAR */
        .status-bar {
            background: var(--bureau-blue);
            color: #ffffff;
            padding: 12px 0;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .pulse-dot {
            height: 8px; width: 8px; background-color: var(--emergency-red);
            border-radius: 50%; display: inline-block;
            margin-right: 6px; animation: pulse-effect 1.5s infinite;
        }

        @keyframes pulse-effect { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* HERO - 65VH HEIGHT */
        .hero-container {
            position: relative;
            width: 100vw;
            height: 65vh; 
            margin-top: 40px;
            background: #000;
            overflow: hidden;
        }

        /* DARKER OVERLAY FOR TEXT READABILITY */
        .hero-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 10;
        }

        .showcase-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 1;
        }

        .active-img {
            opacity: 1 !important;
            z-index: 5 !important;
        }

        /* SCATTER ANIMATION */
        @keyframes ani-scatter {
            0% { transform: scale(1.1); clip-path: inset(10% 30% 10% 30%); filter: contrast(3); }
            30% { clip-path: inset(0% 0% 60% 0%); transform: translateX(-8%); }
            60% { clip-path: inset(60% 0% 0% 0%); transform: translateX(8%); }
            100% { transform: scale(1); clip-path: inset(0 0 0 0); filter: contrast(1); }
        }

        .ani-4 { animation: ani-scatter 0.9s steps(5) forwards; }

    </style>
</head>
<body>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        LIVE: CENTRAL BUREAU FUND — APRIL CYCLE IS <span style="color: var(--action-green);">84% CAPACITY</span>
    </div>

<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200" class="showcase-img active-img">
        <img src="https://images.unsplash.com/photo-1544650039-22886fbb4323?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1520333789090-1afc82db536a?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1560520653-9e0e4c89eb11?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=1200" class="showcase-img"> 
    </div>

    <script>
        const imgs = document.querySelectorAll('.showcase-img');
        let current = 0;

        function cycle() {
            let prev = current;
            current = (current + 1) % imgs.length;

            let nextImg = imgs[current];
            let prevImg = imgs[prev];

            nextImg.classList.remove('ani-4');
            void nextImg.offsetWidth; // Trigger reflow
            nextImg.classList.add('ani-4');
            nextImg.classList.add('active-img');

            setTimeout(() => {
                prevImg.classList.remove('active-img');
            }, 950);
        }

        setInterval(cycle, 5000);
    </script>
<style>
    /* Centers the card perfectly */
    .hero-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 40px; /* Space for status bar */
        position: relative;
        width: 100vw;
        height: 65vh; /* 65% height */
        background: #000;
        overflow: hidden;
    }

    /* THE ELITE 50% WHITE CARD */
    .elite-card {
        z-index: 20; /* Ensures it sits on top of images */
        width: 80%; /* Takes up 80% of width */
        max-width: 480px; /* Maximum size */
        background: rgba(255, 255, 255, 0.5); /* 50% Opacity White */
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        text-align: center;
        position: relative;
    }

    /* THE TYPEWRITER TEXT STYLE */
    .typer-text {
        color: #000000; /* Pure Black Text */
        font-size: 26px; /* BOLD and large per your brief */
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        line-height: 1.2;
        min-height: 60px; /* Prevents card from jumping when text changes */
    }

    /* THE BLINKING CURSOR (pattern interrupt) */
    .cursor {
        font-weight: 200;
        color: rgba(0, 0, 0, 0.7);
        animation: cursor-blink 0.8s infinite;
    }

    @keyframes cursor-blink {
        0% { opacity: 0; }
        50% { opacity: 1; }
        100% { opacity: 0; }
    }
</style>

<div class="elite-card">
    <p class="typer-text">
        <span id="typed"></span><span class="cursor">|</span>
    </p>
</div>

<script>
    // 7 ELITE, SHORT PHRASES (6-7 words each, selling the result)
    const phrases = [
        "The Wealth Migration Has Begun.",
        "Secure Your Grant Slot Immediately.",
        "High Velocity Funding is Here.",
        "Central Bureau private window opens.",
        "Stop struggling. Secure your future.",
        "Only Serious Individuals Need Apply.",
        "Your financial upgrade is live."
    ];

    let pIndex = 0; // current phrase
    let charIndex = 0; // current character in phrase
    let isDeleting = false; 
    let typeSpeed = 100; // Type speed (ms per char)
    const deleteSpeed = 50; // faster delete
    const pauseTime = 2500; // time to stay visible

    function typeEffect() {
        const spanEl = document.getElementById('typed');
        let currentText = phrases[pIndex];

        // Core logic: adding or removing characters
        if (isDeleting) {
            spanEl.textContent = currentText.substring(0, charIndex - 1);
            charIndex--;
        } else {
            spanEl.textContent = currentText.substring(0, charIndex + 1);
            charIndex++;
        }

        // --- Flow State Machine ---

        // 1. We just finished typing the phrase
        if (!isDeleting && charIndex === currentText.length) {
            isDeleting = true; // start deleting...
            setTimeout(typeEffect, pauseTime); // ...after a long pause.
            return;
        }

        // 2. We just finished deleting the phrase
        if (isDeleting && charIndex === 0) {
            isDeleting = false; 
            pIndex = (pIndex + 1) % phrases.length; // move to next phrase
            setTimeout(typeEffect, 500); // short pause before new type
            return;
        }

        // 3. Normal typing/deleting step
        let speed = isDeleting ? deleteSpeed : typeSpeed;
        setTimeout(typeEffect, speed);
    }

    // Start the process
    window.onload = typeEffect;
</script>
</body>
    </html>
