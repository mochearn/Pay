<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBF | High-Velocity Escalation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow-x: hidden; font-family: sans-serif; }

        :root {
            --bureau-blue: #001f3f;
            --action-green: #00c853;
            --emergency-red: #FF4136;
        }

        /* STATUS BAR */
        .status-bar {
            background: var(--bureau-blue);
            color: #ffffff;
            padding: 12px 0;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .pulse-dot {
            height: 8px; width: 8px; background-color: var(--emergency-red);
            border-radius: 50%; display: inline-block;
            margin-right: 6px; animation: pulse-effect 1.5s infinite;
        }

        @keyframes pulse-effect { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* HERO CONTAINER - HEIGHT 65VH */
        .hero-container {
            position: relative;
            width: 100vw;
            height: 65vh; 
            margin-top: 40px;
            background: #000;
            overflow: hidden;
        }

        .hero-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); 
            z-index: 10;
        }

        .showcase-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 1;
        }

        .active-img {
            opacity: 1 !important;
            z-index: 5 !important;
        }

        /* ANIMATIONS */
        @keyframes ani-glitch { 0% { transform: scale(1.2) skew(10deg); filter: blur(20px); } 100% { transform: scale(1) skew(0); filter: blur(0); } }
        @keyframes ani-zoom { 0% { transform: scale(3); filter: blur(15px); } 100% { transform: scale(1); filter: blur(0); } }
        @keyframes ani-rotate { 0% { transform: scale(0) rotate(360deg); } 100% { transform: scale(1) rotate(0deg); } }
        @keyframes ani-static { 0% { transform: translateX(-5%); filter: grayscale(1); } 50% { transform: translateX(5%); } 100% { transform: translateX(0); filter: grayscale(0); } }
        
        /* THE SCATTER ANIMATION */
        @keyframes ani-scatter {
            0% { transform: scale(1.1); clip-path: inset(10% 20% 10% 20%); filter: blur(15px) contrast(2); }
            20% { clip-path: inset(0% 0% 50% 0%); transform: translateX(-5%); }
            40% { clip-path: inset(50% 0% 0% 0%); transform: translateX(5%); }
            60% { clip-path: polygon(0 0, 100% 0, 100% 30%, 0 30%, 0 70%, 100% 70%, 100% 100%, 0 100%); }
            100% { transform: scale(1); clip-path: inset(0 0 0 0); filter: blur(0); }
        }

        .ani-1 { animation: ani-glitch 0.8s ease-in-out forwards; }
        .ani-2 { animation: ani-zoom 0.8s ease-in-out forwards; }
        .ani-3 { animation: ani-rotate 0.8s ease-in-out forwards; }
        .ani-4 { animation: ani-static 0.7s ease-in-out forwards; }
        .ani-5 { animation: ani-scatter 0.9s steps(4) forwards; } /* SCATTER STEPPED */

    </style>
</head>
<body>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        LIVE: CENTRAL BUREAU FUND — APRIL CYCLE IS <span style="color: var(--action-green);">84% CAPACITY</span>
    </div>

    <div class="hero-container">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200" class="showcase-img active-img"> <img src="https://images.unsplash.com/photo-1544650039-22886fbb4323?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1580519542036-c47de6196ba5?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1556742044-3c52d6e88c62?q=80&w=1200" class="showcase-img"> </div>

    <script>
        const imgs = document.querySelectorAll('.showcase-img');
        let current = 0;
        const totalAni = 5;

        function cycle() {
            let prev = current;
            current = (current + 1) % imgs.length;

            let nextImg = imgs[current];
            let prevImg = imgs[prev];

            // Reset animations
            for(let i=1; i<=totalAni; i++) { nextImg.classList.remove('ani-'+i); }

            // Pick random animation (including Scatter)
            let rand = Math.floor(Math.random() * totalAni) + 1;
            nextImg.classList.add('ani-' + rand);
            nextImg.classList.add('active-img');

            // Stacking cleanup
            setTimeout(() => {
                prevImg.classList.remove('active-img');
            }, 950);
        }

        setInterval(cycle, 5000);
    </script>
</body>
    </html>
