<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBF | Elite Showcase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow-x: hidden; font-family: Arial, sans-serif; }

        /* SLIM STATUS BAR */
        .status-bar {
            background: #001f3f;
            color: #ffffff;
            padding: 10px 0;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 100;
        }

        .pulse-dot {
            height: 8px; width: 8px; background-color: #FF4136;
            border-radius: 50%; display: inline-block;
            margin-right: 6px; box-shadow: 0 0 8px #FF4136;
            animation: pulse-effect 1.5s infinite;
        }

        @keyframes pulse-effect {
            0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
        }

        /* FULL SCREEN FADING SLIDER */
        .fading-slider {
            position: relative;
            width: 100%;
            height: 400px; /* Adjust height based on your preference */
            overflow: hidden;
            background: #000;
            border-bottom: 4px solid #FFDC00;
        }

        .fading-slider img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        /* Animation Logic for 5 key images (Showing the Future) */
        .fading-slider img:nth-child(1) { animation: fade 20s infinite 0s; }
        .fading-slider img:nth-child(2) { animation: fade 20s infinite 4s; }
        .fading-slider img:nth-child(3) { animation: fade 20s infinite 8s; }
        .fading-slider img:nth-child(4) { animation: fade 20s infinite 12s; }
        .fading-slider img:nth-child(5) { animation: fade 20s infinite 16s; }

        @keyframes fade {
            0% { opacity: 0; }
            5% { opacity: 1; }
            20% { opacity: 1; }
            25% { opacity: 0; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        LIVE: CENTRAL BUREAU FUND — APRIL CYCLE IS <span style="color: #FFDC00;">84% CAPACITY</span>
    </div>

    <div class="fading-slider">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=800" alt="Working">
        
        <img src="https://images.unsplash.com/photo-1580519542036-c47de6196ba5?q=80&w=800" alt="Result">
        
        <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=800" alt="Shopping">
        
        <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?q=80&w=800" alt="Freedom">
        
        <img src="https://images.unsplash.com/photo-1556761175-b413da4baf72?q=80&w=800" alt="Community">
    </div>

</body>
            </html>
