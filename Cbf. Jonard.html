<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBF | Live Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; overflow-x: hidden; }

        /* SLIM STATUS BAR */
        .status-bar {
            background: #001f3f; /* Deep Bureau Blue */
            color: #ffffff;
            padding: 8px 0;
            font-size: 11px;
            text-align: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* RESTORED PULSE ANIMATION */
        .pulse-dot {
            height: 8px;
            width: 8px;
            background-color: #FF4136;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #FF4136;
            animation: pulse-effect 1.5s infinite;
        }

        @keyframes pulse-effect {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* IMAGE SLIDER */
        .slider-container {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #000;
            border-bottom: 3px solid #FFDC00; /* Bureau Gold */
        }

        .slider-track {
            display: flex;
            width: calc(280px * 22); /* 11 images x 2 */
            animation: scroll 30s linear infinite;
        }

        .slider-track img {
            width: 280px;
            height: 180px;
            object-fit: cover;
            border-right: 2px solid #fff;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-280px * 11)); }
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        LIVE: CENTRAL BUREAU FUND — APRIL CYCLE IS <span style="color: #FFDC00;">84% CAPACITY</span>
    </div>
