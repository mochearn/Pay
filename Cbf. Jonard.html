<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBF | Private Briefing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow: hidden; font-family: 'Arial', sans-serif; color: #fff; }

        :root {
            --bureau-blue: #001f3f;
            --rich-green: #004d40;
            --action-green: #00c853;
            --emergency-red: #FF4136;
        }

        /* 1. STATUS BAR */
        .status-bar {
            background: var(--bureau-blue);
            color: #ffffff;
            padding: 12px 0;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            border-bottom: 2px solid var(--rich-green);
        }

        .pulse-dot {
            height: 8px; width: 8px; background-color: var(--emergency-red);
            border-radius: 50%; display: inline-block;
            margin-right: 6px; box-shadow: 0 0 8px var(--emergency-red);
            animation: pulse-effect 1.5s infinite;
        }

        @keyframes pulse-effect { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* 2. HERO SLIDER */
        .hero-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #050505;
        }

        /* DARK OVERLAY - Makes the text pop */
        .hero-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 10;
        }

        .showcase-img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* CRAZY GLITCH ANIMATION */
        .glitch-transition {
            animation: glitch-scatter 0.8s ease-in-out forwards;
        }

        @keyframes glitch-scatter {
            0% { opacity: 0; transform: scale(1.2) skewX(15deg); filter: blur(15px); }
            50% { opacity: 1; transform: scale(0.9) skewX(-10deg); filter: contrast(150%) hue-rotate(45deg); }
            100% { opacity: 1; transform: scale(1) skewX(0); filter: blur(0); }
        }

        /* 3. CENTERED CONTENT */
        .hero-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            width: 85%;
        }

        .hero-headline {
            font-size: 34px; font-weight: 900; line-height: 1.1; margin-bottom: 25px;
        }
        .hero-headline span { color: var(--action-green); }

        .story-box {
            border-left: 4px solid var(--action-green);
            background: rgba(0, 77, 64, 0.25);
            backdrop-filter: blur(10px);
            padding: 20px; text-align: left;
            border-radius: 4px;
        }
        .story-box p { font-style: italic; color: #eee; font-size: 16px; line-height: 1.5; }

    </style>
</head>
<body>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        LIVE: CENTRAL BUREAU FUND — APRIL CYCLE IS <span style="color: var(--action-green);">84% CAPACITY</span>
    </div>

    <div class="hero-container">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=800&q=80" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?auto=format&fit=crop&w=800&q=80" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1556740758-90de374c12ad?auto=format&fit=crop&w=800&q=80" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1531482615713-2afd69097998?auto=format&fit=crop&w=800&q=80" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=800&q=80" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=800&q=80" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1580519542036-c47de6196ba5?auto=format&fit=crop&w=800&q=80" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=800&q=80" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?auto=format&fit=crop&w=800&q=80" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=800&q=80" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?auto=format&fit=crop&w=800&q=80" class="showcase-img">

        <div class="hero-content">
            <h1 class="hero-headline">The Wealth Migration <br><span>Has Begun.</span> 🏛️</h1>
            <div class="story-box">
                <p>"While most are trapped in the 9-5 struggle, the <strong>Central Bureau Fund (CBF)</strong> has opened a private window for serious individuals to bypass the noise and secure high-velocity grant slots."</p>
            </div>
        </div>
    </div>

    <script>
        const imgs = document.querySelectorAll('.showcase-img');
        let current = 0;

        function cycle() {
            imgs[current].classList.remove('glitch-transition');
            imgs[current].style.opacity = 0;
            current = (current + 1) % imgs.length;
            imgs[current].classList.add('glitch-transition');
            imgs[current].style.opacity = 1;
        }

        if(imgs.length > 0) {
            imgs[0].style.opacity = 1;
            setInterval(cycle, 5000); // 5 seconds between crazy transitions
        }
    </script>
</body>
        </html>
