<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBF | Elite Wealth Migration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow-x: hidden; font-family: sans-serif; }

        :root {
            --bureau-blue: #001f3f;
            --action-green: #00c853;
            --emergency-red: #FF4136;
        }

        /* STATUS BAR */
        .status-bar {
            background: var(--bureau-blue);
            color: #ffffff;
            padding: 12px 0;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .pulse-dot {
            height: 8px; width: 8px; background-color: var(--emergency-red);
            border-radius: 50%; display: inline-block;
            margin-right: 6px; animation: pulse-effect 1.5s infinite;
        }

        @keyframes pulse-effect { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* HERO - 65VH HEIGHT */
        .hero-container {
            position: relative;
            width: 100vw;
            height: 65vh; 
            margin-top: 40px;
            background: #000;
            overflow: hidden;
        }

        .hero-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); 
            z-index: 10;
        }

        .showcase-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 1;
        }

        .active-img {
            opacity: 1 !important;
            z-index: 5 !important;
        }

        /* ANIMATIONS */
        @keyframes ani-glitch { 0% { transform: scale(1.2) skew(5deg); filter: blur(15px); } 100% { transform: scale(1) skew(0); filter: blur(0); } }
        @keyframes ani-zoom { 0% { transform: scale(2.5); filter: blur(10px); } 100% { transform: scale(1); filter: blur(0); } }
        @keyframes ani-static { 0% { transform: translateX(-3%); filter: grayscale(1); } 50% { transform: translateX(3%); } 100% { transform: translateX(0); filter: grayscale(0); } }
        
        /* THE "SCATTER & SNAP" */
        @keyframes ani-scatter {
            0% { transform: scale(1.1); clip-path: inset(10% 30% 10% 30%); filter: contrast(3); }
            30% { clip-path: inset(0% 0% 60% 0%); transform: translateX(-8%); }
            60% { clip-path: inset(60% 0% 0% 0%); transform: translateX(8%); }
            100% { transform: scale(1); clip-path: inset(0 0 0 0); filter: contrast(1); }
        }

        .ani-1 { animation: ani-glitch 0.8s ease-out forwards; }
        .ani-2 { animation: ani-zoom 0.8s ease-out forwards; }
        .ani-3 { animation: ani-static 0.6s linear forwards; }
        .ani-4 { animation: ani-scatter 0.9s steps(5) forwards; }

    </style>
</head>
<body>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        LIVE: CENTRAL BUREAU FUND — APRIL CYCLE IS <span style="color: var(--action-green);">84% CAPACITY</span>
    </div>

    <div class="hero-container">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200" class="showcase-img active-img"> <img src="https://images.unsplash.com/photo-1544650039-22886fbb4323?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1520333789090-1afc82db536a?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1560520653-9e0e4c89eb11?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?q=80&w=1200" class="showcase-img"> <img src="https://images.unsplash.com/photo-1549416878-b9ca35c2d47b?q=80&w=1200" class="showcase-img"> </div>

    <script>
        const imgs = document.querySelectorAll('.showcase-img');
        let current = 0;
        const totalAni = 4;

        function cycle() {
            let prev = current;
            current = (current + 1) % imgs.length;

            let nextImg = imgs[current];
            let prevImg = imgs[prev];

            for(let i=1; i<=totalAni; i++) { nextImg.classList.remove('ani-'+i); }

            let rand = Math.floor(Math.random() * totalAni) + 1;
            nextImg.classList.add('ani-' + rand);
            nextImg.classList.add('active-img');

            setTimeout(() => {
                prevImg.classList.remove('active-img');
            }, 950);
        }

        setInterval(cycle, 5000);
    </script>
</body>
    </html>
