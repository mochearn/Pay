<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBF | Wealth Migration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow-x: hidden; font-family: sans-serif; }

        :root {
            --bureau-blue: #001f3f;
            --action-green: #00c85 I3;
            --emergency-red: #FF4136;
        }

        /* 1. STATUS BAR */
        .status-bar {
            background: var(--bureau-blue);
            color: #ffffff;
            padding: 12px 0;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            position: fixed;
            top: 0; width: 100%; z-index: 2000;
        }

        .pulse-dot {
            height: 8px; width: 8px; background-color: var(--emergency-red);
            border-radius: 50%; display: inline-block;
            margin-right: 6px; animation: pulse-effect 1.5s infinite;
        }
        @keyframes pulse-effect { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* 2. HERO CONTAINER - THE "ROOM" */
        .hero-container {
            position: relative;
            width: 100vw;
            height: 65vh !important; /* HEIGHT LOCKED */
            margin-top: 40px;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

       /* LIGHTER DARKNESS OVERLAY (0.8) */
.hero-container::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.55) !important; /* Changed from 0.95 */
    z-index: 10;
    pointer-events: none;
              }

        /* THE WALLPAPER (IMAGES) */
        .showcase-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 1;
        }

        .active-img { opacity: 1 !important; z-index: 5 !important; }

        /* SCATTER ANIMATION */
        @keyframes ani-scatter {
            0% { transform: scale(1.1); clip-path: inset(10% 30% 10% 30%); filter: contrast(3); }
            30% { clip-path: inset(0% 0% 60% 0%); transform: translateX(-8%); }
            60% { clip-path: inset(60% 0% 0% 0%); transform: translateX(8%); }
            100% { transform: scale(1); clip-path: inset(0 0 0 0); filter: contrast(1); }
        }
        .ani-4 { animation: ani-scatter 0.9s steps(5) forwards; }

/* SMALLER FIXED HEIGHT CARD */
.elite-card-v7 {
    position: relative;
    z-index: 1000 !important;
    width: 85%;
    max-width: 420px; /* Slimmer */
    height: 160px; /* SHORTER - Changed from 220px */
    background: rgba(255, 255, 255, 0.5); 
    border-radius: 12px;
    padding: 20px 20px 20px 55px; /* Streamlined Padding */
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    animation: pulse-v7 3s ease-in-out infinite;
    -webkit-tap-highlight-color: transparent;
}

        @keyframes pulse-v7 {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* BACK ICON (<) */
        .back-nav-v7 {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 50%;
            z-index: 1001;
        }

        .back-nav-v7:active { animation: flash-v7 0.3s ease-out; }
        @keyframes flash-v7 { 0% { background: rgba(0, 0, 0, 0.2); } 100% { background: transparent; } }

        .chevron-left-v7 {
            width: 14px; height: 14px;
            border-left: 5px solid #000; border-bottom: 5px solid #000;
            transform: rotate(45deg); margin-left: 6px;
        }

/* SMALLER HERMES TEXT STYLE */
.hermes-v7 {
    color: #000; font-family: 'Inter', sans-serif;
    font-size: 19px; /* SMALLER - Changed from 24px */
    font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.8px; line-height: 1.1;
        }

        #typed-v7::after { content: "|"; animation: blink-v7 0.8s infinite; margin-left: 2px; }
        @keyframes blink-v7 { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        LIVE: CENTRAL BUREAU FUND — APRIL CYCLE IS <span style="color: var(--action-green);">84% CAPACITY</span>
    </div>

    <div class="hero-container">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200" class="showcase-img active-img">
        <img src="https://images.unsplash.com/photo-1544650039-22886fbb4323?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1520333789090-1afc82db536a?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1560520653-9e0e4c89eb11?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=1200" class="showcase-img">

        <div class="elite-card-v7">
            <div class="back-nav-v7" onclick="prevSentence()">
                <div class="chevron-left-v7"></div>
            </div>
            <div class="hermes-v7">
              <div id="typed-v7"></div>
            </div>
        </div>
    </div>

    <script>
(function() {
    // 1. THE USER NAME (This is the placeholder for now)
    let userName = "Soldier"; 

    // 2. THE DYNAMIC SENTENCES
    const sentences = [
        `Welcome, ${userName}. Your Migration Begins.`, // First sentence mentions the name
  "<span style='color: orange;'>Get Access to </span><span style='color: #00c853;'>₦500,000 — ₦3.2M</span><span style='color: orange;'> Disbursement</span>",
        "Secure Your Grant Slot Now.",
        "High Velocity Funding is Live.",
        "Bypass the noise. Get results.",
        "Elite status requires elite action.",
        "Join the Central Bureau Fund."
    ];

    let sIdx = 0; let cIdx = 0; let isDeleting = false; let timer;

function type() {
        const target = document.getElementById("typed-v7");
        const fullText = sentences[sIdx];

        if (isDeleting) {
            // If we hit a tag while deleting, skip past it
            if (fullText.charAt(cIdx - 1) === '>') {
                cIdx = fullText.lastIndexOf('<', cIdx - 1);
            } else {
                cIdx--;
            }
        } else {
            // If we hit a tag while typing, skip past it
            if (fullText.charAt(cIdx) === '<') {
                cIdx = fullText.indexOf('>', cIdx) + 1;
            } else {
                cIdx++;
            }
        }

        target.innerHTML = fullText.substring(0, cIdx);

        let speed = isDeleting ? 30 : 75;

        // If we are inside a tag, speed up to 0 to make it instant
        if (!isDeleting && fullText.charAt(cIdx) === '<') speed = 0;

        if (!isDeleting && cIdx >= fullText.length) {
            isDeleting = true;
            timer = setTimeout(type, 2000);
        } else if (isDeleting && cIdx <= 0) {
            isDeleting = false;
            sIdx = (sIdx + 1) % sentences.length;
            timer = setTimeout(type, 500);
        } else {
            timer = setTimeout(type, speed);
        }
        }

    // BACK BUTTON LOGIC
    window.prevSentence = function() {
        clearTimeout(timer);
        isDeleting = false; cIdx = 0;
        sIdx = (sIdx - 1 + sentences.length) % sentences.length;
        type();
    };

    type();
})();

/* IMAGE CYCLE LOGIC (Keep this as is) */
const imgs = document.querySelectorAll('.showcase-img');
let current = 0;
function cycle() {
    let prev = current;
    current = (current + 1) % imgs.length;
    let nextImg = imgs[current];
    let prevImg = imgs[prev];
    nextImg.classList.remove('ani-4');
    void nextImg.offsetWidth; 
    nextImg.classList.add('ani-4');
    nextImg.classList.add('active-img');
    setTimeout(() => { prevImg.classList.remove('active-img'); }, 950);
}
setInterval(cycle, 5000);
    </script>
</body>
    </html>
