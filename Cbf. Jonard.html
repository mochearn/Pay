<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Bureau Fund | Private Briefing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f9; }

        :root {
            --bureau-blue: #001f3f;
            --action-blue: #0074D9;
            --bureau-gold: #FFDC00;
            --emergency-red: #FF4136;
        }

        /* 1. SLIM STATUS BAR */
        .status-bar {
            background: var(--bureau-blue);
            color: #ffffff;
            padding: 6px 0; /* Shortened height */
            font-size: 11px;
            letter-spacing: 1px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
        }

        .pulse-dot {
            height: 7px;
            width: 7px;
            background-color: var(--emergency-red);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse-animation 1.5s infinite;
        }

        /* 2. IMAGE LOOPING SLIDER */
        .slider-container {
            width: 100%;
            height: 180px; /* Adjust height as needed */
            overflow: hidden;
            background: #eee;
            border-bottom: 2px solid var(--bureau-gold);
            position: relative;
        }

        .slider-track {
            display: flex;
            width: calc(250px * 22); /* 11 images x 2 for seamless loop */
            animation: scroll 40s linear infinite;
        }

        .slider-track img {
            width: 250px;
            height: 180px;
            object-fit: cover;
            filter: brightness(0.9);
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-250px * 11)); }
        }

        @keyframes pulse-animation {
            0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
        }

        /* 3. HERO CONTENT */
        .hero-section { padding: 40px 20px; text-align: center; }
        .hero-headline { color: var(--bureau-blue); font-size: 32px; font-weight: 900; margin-bottom: 20px; }
        .hero-headline span { color: var(--action-blue); }
    </style>
</head>
<body>

    <div class="status-bar">
