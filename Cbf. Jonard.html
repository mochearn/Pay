<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBF | Private Briefing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow-x: hidden; font-family: 'Segoe UI', Roboto, sans-serif; color: #fff; }

        :root {
            --bureau-blue: #001f3f;
            --rich-green: #004d40;
            --action-green: #00c853;
            --emergency-red: #FF4136;
        }

        /* 1. SLIM STATUS BAR */
        .status-bar {
            background: var(--bureau-blue);
            color: #ffffff;
            padding: 8px 0;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid var(--rich-green);
        }

        .pulse-dot {
            height: 7px; width: 7px; background-color: var(--emergency-red);
            border-radius: 50%; display: inline-block;
            margin-right: 5px; box-shadow: 0 0 8px var(--emergency-red);
            animation: pulse-effect 1.5s infinite;
        }

        @keyframes pulse-effect { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* 2. FULL SCREEN IMAGERY & OVERLAY */
        .hero-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* DARK OVERLAY */
        .hero-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8));
            z-index: 10;
        }

        .showcase-slider img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        /* THE CRAZY GLITCH TRANSITION */
        .glitch-transition {
            animation: glitch-scatter 0.7s ease-in-out forwards;
        }

        @keyframes glitch-scatter {
            0% { opacity: 0; transform: scale(1.2); filter: blur(10px) hue-rotate(90deg); }
            30% { opacity: 1; transform: scale(0.9) skewX(15deg); filter: blur(2px) contrast(200%); }
            60% { transform: scale(1.1) skewX(-10deg) translateX(20px); filter: hue-rotate(-90deg); }
            100% { opacity: 1; transform: scale(1) skewX(0); filter: blur(0); }
        }

        /* 3. HERO CONTENT OVERLAY */
        .hero-content {
            position: absolute;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            width: 90%; max-width: 600px;
        }

        .hero-headline {
            font-size: 36px; font-weight: 900; line-height: 1.1; margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .hero-headline span { color: var(--action-green); }

        .story-box {
            border-left: 5px solid var(--action-green);
            background: rgba(0, 77, 64, 0.2);
            backdrop-filter: blur(5px);
            padding: 20px; text-align: left;
            border-radius: 4px;
        }
        .story-box p { font-style: italic; color: #e0e0e0; font-size: 17px; }

    </style>
</head>
<body>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        LIVE: CENTRAL BUREAU FUND — APRIL CYCLE IS <span style="color: var(--action-green);">84% CAPACITY</span>
    </div>

    <div class="hero-container">
        <div class="showcase-slider" id="slider">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/2247614305880139442_0" class="showcase-img">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/2247614305880139442_1" class="showcase-img">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/2247614305880139442_2" class="showcase-img">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/2247614305880139442_3" class="showcase-img">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/2247614305880139442_4" class="showcase-img">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/2247614305880139442_5" class="showcase-img">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/2247614305880139442_6" class="showcase-img">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/2247614305880139442_7" class="showcase-img">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/2247614305880139442_8" class="showcase-img">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/2247614305880139442_9" class="showcase-img">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/2247614305880139442_10" class="showcase-img">
        </div>

        <div class="hero-content">
            <h1 class="hero-headline">The Wealth Migration <br><span>Has Begun.</span> 🏛️</h1>
            
            <div class="story-box">
                <p>
                    "While most are trapped in the 9-5 struggle, the <strong>Central Bureau Fund (CBF)</strong> has opened a private window for serious individuals to bypass the noise and secure high-velocity grant slots."
                </p>
            </div>
        </div>
    </div>

    <script>
        const images = document.querySelectorAll('.showcase-img');
        let current = 0;

        function nextImage() {
            images[current].classList.remove('glitch-transition');
            images[current].style.opacity = 0;
            
            current = (current + 1) % images.length;
            
            images[current].classList.add('glitch-transition');
            images[current].style.opacity = 1;
        }

        // Initialize first image
        images[0].style.opacity = 1;
        setInterval(nextImage, 5000);
    </script>
</body>
                </html>
