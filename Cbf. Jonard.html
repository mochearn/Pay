<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBF |Wealth Migration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow-x: hidden; font-family: sans-serif; }

        :root {
            --bureau-blue: #001f3f;
            --action-green: #00c853;
            --emergency-red: #FF4136;
        }

        /* STATUS BAR */
        .status-bar {
            background: var(--bureau-blue);
            color: #ffffff;
            padding: 12px 0;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .pulse-dot {
            height: 8px; width: 8px; background-color: var(--emergency-red);
            border-radius: 50%; display: inline-block;
            margin-right: 6px; animation: pulse-effect 1.5s infinite;
        }

        @keyframes pulse-effect { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* HERO - 65VH HEIGHT */
        .hero-container {
            position: relative;
            width: 100vw;
            height: 65vh; 
            margin-top: 40px;
            background: #000;
            overflow: hidden;
        }

        /* DARKER OVERLAY FOR TEXT READABILITY */
        .hero-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 10;
        }

        .showcase-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 1;
        }

        .active-img {
            opacity: 1 !important;
            z-index: 5 !important;
        }

        /* SCATTER ANIMATION */
        @keyframes ani-scatter {
            0% { transform: scale(1.1); clip-path: inset(10% 30% 10% 30%); filter: contrast(3); }
            30% { clip-path: inset(0% 0% 60% 0%); transform: translateX(-8%); }
            60% { clip-path: inset(60% 0% 0% 0%); transform: translateX(8%); }
            100% { transform: scale(1); clip-path: inset(0 0 0 0); filter: contrast(1); }
        }

        .ani-4 { animation: ani-scatter 0.9s steps(5) forwards; }

    </style>
</head>
<body>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        LIVE: CENTRAL BUREAU FUND — APRIL CYCLE IS <span style="color: var(--action-green);">84% CAPACITY</span>
    </div>

<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200" class="showcase-img active-img">
        <img src="https://images.unsplash.com/photo-1544650039-22886fbb4323?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1520333789090-1afc82db536a?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1560520653-9e0e4c89eb11?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=1200" class="showcase-img"> 
    </div>

    <script>
        const imgs = document.querySelectorAll('.showcase-img');
        let current = 0;

        function cycle() {
            let prev = current;
            current = (current + 1) % imgs.length;

            let nextImg = imgs[current];
            let prevImg = imgs[prev];

            nextImg.classList.remove('ani-4');
            void nextImg.offsetWidth; // Trigger reflow
            nextImg.classList.add('ani-4');
            nextImg.classList.add('active-img');

            setTimeout(() => {
                prevImg.classList.remove('active-img');
            }, 950);
        }

        setInterval(cycle, 5000);
    </script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">

<style>
    /* 1. DARKNESS & CENTERING Fixes */
    .hero-container {
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        height: 65vh !important;
        position: relative !important;
        overflow: hidden;
        background: #000;
    }

    /* THE ULTRA-DARK OVERLAY (increased to 85%) */
    .hero-container::after {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); 
        z-index: 10;
        pointer-events: none;
    }

    /* THE NON-EXPANDING WHITE CARD */
    .elite-card-live-lock {
        position: relative;
        z-index: 1000 !important;
        width: 85%;
        max-width: 480px;
        min-height: 250px; /* LOCKS HEIGHT - PREVENTS EXPANSION */
        background: rgba(255, 255, 255, 0.5); /* 50% Opacity */
        padding: 50px 30px; /* Adjust padding for fixed height */
        border-radius: 12px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        text-align: center;
        display: flex; /* Helps align content inside non-expanding box */
        flex-direction: column;
        justify-content: center;
        
        /* PULSE ANIMATION */
        animation: pulse-lock 3s ease-in-out infinite;
    }

    @keyframes pulse-lock {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
    }

    /* THE HERMES TEXT */
    .hermes-text-center {
        color: #000;
        font-family: 'Inter', sans-serif; /* Hermes Bold Authority alternative */
        font-size: 24px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        line-height: 1.3;
        margin: 0;
        position: relative;
    }

    /* CURSOR FIX: Cursor is now part of the text element */
    #typed-target::after {
        content: "|";
        font-weight: 100;
        color: rgba(0,0,0,0.6);
        animation: cursor-blink 0.8s infinite;
        margin-left: 2px;
    }

    @keyframes cursor-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* --- THE BACK NAV ICON --- */
    .elite-nav-back {
        position: absolute;
        left: 20px;
        top: 20px;
        width: 38px;
        height: 38px;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%; /* Rounded hover */
        cursor: pointer;
        transition: background 0.25s ease;
        padding: 0; /* Clear previous transparent wrappers */
    }

    /* Hover effect is round light grey */
    .elite-nav-back:hover {
        background-color: #f0f0f0;
    }

    /* The custom icon blueprint (Horizontal Back Chevron) */
    .elite-nav-back::before,
    .elite-nav-back::after {
        content: "";
        position: absolute;
        width: 14px;
        height: 2px;
        background-color: #000; /* Pure black */
        transform-origin: left center;
    }

    /* Top leg of the horizontal back icon */
    .elite-nav-back::before {
        transform: rotate(-135deg);
        top: 15px; /* Adjust vertical center */
        left: 14px; /* Adjust horizontal position */
    }

    /* Bottom leg of the horizontal back icon */
    .elite-nav-back::after {
        transform: rotate(135deg);
        bottom: 15px; /* Adjust vertical center */
        left: 14px; /* Adjust horizontal position */
    }

</style>

<div class="elite-card-live-lock">

    <div class="elite-nav-back" onclick="goBackSentence()"></div>

    <div class="hermes-text-center">
        <span id="typed-target"></span>
    </div>

</div>

<script>
    (function() {
        // 7 sentence, elite phrases
        const sentences = [
            "The Wealth Migration Has Begun.",
            "Secure Your Grant Slot Now.",
            "High Velocity Funding is Live.",
            "Bypass the noise. Get results.",
            "Limited private windows are open.",
            "Elite status requires elite action.",
            "Join the Central Bureau Fund."
        ];

        let sIndex = 0;
        let cIndex = 0;
        let isDeleting = false;
        let typeTimer;

        function typeAction() {
            const target = document.getElementById("typed-target");
            const currentSentence = sentences[sIndex];

            // Core logic: adding or removing characters
            if (isDeleting) {
                target.textContent = currentSentence.substring(0, cIndex - 1);
                cIndex--;
            } else {
                target.textContent = currentSentence.substring(0, cIndex + 1);
                cIndex++;
            }

            // Flow speeds
            let speed = isDeleting ? 30 : 75; // Fast delete, smooth type

            if (!isDeleting && cIndex === currentSentence.length) {
                isDeleting = true; // Pause before deleting
                typeTimer = setTimeout(typeAction, 2000); // 2s pause
            } else if (isDeleting && cIndex === 0) {
                isDeleting = false; 
                sIndex = (sIndex + 1) % sentences.length; // Jump to next phrase
                typeTimer = setTimeout(typeAction, 500); // short pause
            } else {
                typeTimer = setTimeout(typeAction, speed);
            }
        }

        // --- BACK BUTTON LOGIC (Global Function) ---
        window.goBackSentence = function() {
            clearTimeout(typeTimer); // stops typing immediately
            
            // Jump to the PREVIOUS sentence in the list
            sIndex = (sIndex - 1 + sentences.length) % sentences.length;
            
            // Re-initialize from start of phrase
            isDeleting = false;
            cIndex = 0;
            typeAction();
        };

        // Start the process
        setTimeout(typeAction, 1000);
    })();
    </script>
</body>
</html>
