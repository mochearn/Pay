<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBF | Private Briefing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #fff; }

        :root {
            --bureau-blue: #001f3f;
            --rich-green: #004d40;
            --action-green: #00c853;
            --emergency-red: #FF4136;
        }

        /* 1. SLIM STATUS BAR */
        .status-bar {
            background: var(--bureau-blue);
            color: #ffffff;
            padding: 8px 0;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .pulse-dot {
            height: 7px; width: 7px; background-color: var(--emergency-red);
            border-radius: 50%; display: inline-block;
            margin-right: 5px; animation: pulse-effect 1.5s infinite;
        }

        @keyframes pulse-effect { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* 2. FULL SCREEN IMAGERY & OVERLAY */
        .hero-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        .hero-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 10;
        }

        .showcase-img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
        }

        /* "CRAZY" GLITCH TRANSITION */
        .glitch-transition {
            animation: glitch-scatter 0.8s ease-in-out forwards;
        }

        @keyframes glitch-scatter {
            0% { opacity: 0; transform: scale(1.3) skewX(20deg); filter: blur(20px) hue-rotate(90deg); }
            40% { opacity: 1; transform: scale(0.85) skewX(-15deg); filter: contrast(180%) brightness(1.5); }
            70% { transform: scale(1.05) translateX(30px); filter: hue-rotate(-90deg); }
            100% { opacity: 1; transform: scale(1) skewX(0); filter: blur(0); }
        }

        /* 3. HERO CONTENT OVERLAY */
        .hero-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            width: 90%; max-width: 600px;
        }

        .hero-headline {
            font-size: 36px; font-weight: 900; line-height: 1.1; margin-bottom: 20px;
        }
        .hero-headline span { color: var(--action-green); }

        .story-box {
            border-left: 5px solid var(--action-green);
            background: rgba(0, 77, 64, 0.35);
            backdrop-filter: blur(10px);
            padding: 25px; text-align: left;
            border-radius: 4px;
        }
        .story-box p { font-style: italic; color: #f0f0f0; font-size: 17px; }

    </style>
</head>
<body>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        LIVE: CENTRAL BUREAU FUND — APRIL CYCLE IS <span style="color: var(--action-green);">84% CAPACITY</span>
    </div>

    <div class="hero-container">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6040755482890345020_0" class="showcase-img">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6040755482890345020_1" class="showcase-img">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6040755482890345020_2" class="showcase-img">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6040755482890345020_3" class="showcase-img">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6040755482890345020_4" class="showcase-img">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6040755482890345020_5" class="showcase-img">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6040755482890345020_6" class="showcase-img">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6040755482890345020_7" class="showcase-img">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6040755482890345020_8" class="showcase-img">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6040755482890345020_9" class="showcase-img">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6040755482890345020_10" class="showcase-img">

        <div class="hero-content">
            <h1 class="hero-headline">The Wealth Migration <br><span>Has Begun.</span> 🏛️</h1>
            <div class="story-box">
                <p>"While most are trapped in the 9-5 struggle, the <strong>Central Bureau Fund (CBF)</strong> has opened a private window for serious individuals to bypass the noise and secure high-velocity grant slots."</p>
            </div>
        </div>
    </div>

    <script>
        const images = document.querySelectorAll('.showcase-img');
        let current = 0;

        function startShow() {
            if(images.length === 0) return;
            images[0].style.opacity = 1;

            setInterval(() => {
                images[current].classList.remove('glitch-transition');
                images[current].style.opacity = 0;
                
                current = (current + 1) % images.length;
                
                images[current].classList.add('glitch-transition');
                images[current].style.opacity = 1;
            }, 6000);
        }

        window.onload = startShow;
    </script>
</body>
            </html>
