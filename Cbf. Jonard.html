<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBF |Wealth Migration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow-x: hidden; font-family: sans-serif; }

        :root {
            --bureau-blue: #001f3f;
            --action-green: #00c853;
            --emergency-red: #FF4136;
        }

        /* STATUS BAR */
        .status-bar {
            background: var(--bureau-blue);
            color: #ffffff;
            padding: 12px 0;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .pulse-dot {
            height: 8px; width: 8px; background-color: var(--emergency-red);
            border-radius: 50%; display: inline-block;
            margin-right: 6px; animation: pulse-effect 1.5s infinite;
        }

        @keyframes pulse-effect { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* HERO - 65VH HEIGHT */
        .hero-container {
            position: relative;
            width: 100vw;
            height: 65vh; 
            margin-top: 40px;
            background: #000;
            overflow: hidden;
        }

        /* DARKER OVERLAY FOR TEXT READABILITY */
        .hero-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 10;
        }

        .showcase-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 1;
        }

        .active-img {
            opacity: 1 !important;
            z-index: 5 !important;
        }

        /* SCATTER ANIMATION */
        @keyframes ani-scatter {
            0% { transform: scale(1.1); clip-path: inset(10% 30% 10% 30%); filter: contrast(3); }
            30% { clip-path: inset(0% 0% 60% 0%); transform: translateX(-8%); }
            60% { clip-path: inset(60% 0% 0% 0%); transform: translateX(8%); }
            100% { transform: scale(1); clip-path: inset(0 0 0 0); filter: contrast(1); }
        }

        .ani-4 { animation: ani-scatter 0.9s steps(5) forwards; }

    </style>
</head>
<body>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        LIVE: CENTRAL BUREAU FUND — APRIL CYCLE IS <span style="color: var(--action-green);">84% CAPACITY</span>
    </div>

<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200" class="showcase-img active-img">
        <img src="https://images.unsplash.com/photo-1544650039-22886fbb4323?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1520333789090-1afc82db536a?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1560520653-9e0e4c89eb11?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?q=80&w=1200" class="showcase-img">
        <img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=1200" class="showcase-img"> 
    </div>

    <script>
        const imgs = document.querySelectorAll('.showcase-img');
        let current = 0;

        function cycle() {
            let prev = current;
            current = (current + 1) % imgs.length;

            let nextImg = imgs[current];
            let prevImg = imgs[prev];

            nextImg.classList.remove('ani-4');
            void nextImg.offsetWidth; // Trigger reflow
            nextImg.classList.add('ani-4');
            nextImg.classList.add('active-img');

            setTimeout(() => {
                prevImg.classList.remove('active-img');
            }, 950);
        }

        setInterval(cycle, 5000);
    </script>
       <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">

<style>
    /* FORCES THE CONTAINER TO BE DARK AND CENTERED */
    .hero-container {
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        height: 65vh !important;
        position: relative !important;
        overflow: hidden;
        background: #000;
    }

    /* THE ULTRA-DARK OVERLAY (0.8 opacity) */
    .hero-container::after {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8) !important; /* Forces background to be very dark */
        z-index: 10;
        pointer-events: none;
    }

    /* THE LIVE PULSING WHITE CARD */
    .elite-card-live {
        position: relative;
        z-index: 1000 !important; /* Stays above everything */
        width: 85%;
        max-width: 480px;
        background: rgba(255, 255, 255, 0.5); /* 50% Opacity */
        padding: 45px 25px;
        border-radius: 12px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        text-align: center;
        
        /* PULSE ANIMATION */
        animation: pulse-live 3s ease-in-out infinite;
    }

    @keyframes pulse-live {
        0% { transform: scale(1); box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        50% { transform: scale(1.03); box-shadow: 0 30px 60px rgba(0,200,83,0.3); } /* Subtle green glow */
        100% { transform: scale(1); box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
    }

    /* HERMES-STYLE TEXT (BOLD, CLEAN, ELITE) */
    .hermes-text {
        color: #000;
        font-family: 'Inter', sans-serif; /* High-end bold alternative to Hermes */
        font-size: 26px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin: 0;
        min-height: 90px;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1.2;
    }

    .cursor {
        font-weight: 300;
        margin-left: 5px;
        animation: blink 0.8s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>

<div class="elite-card-live">
    <div class="hermes-text">
        <span id="typed-target"></span><span class="cursor">|</span>
    </div>
</div>

<script>
    (function() {
        const sentences = [
            "The Wealth Migration Has Begun.",
            "Secure Your Grant Slot Now.",
            "High Velocity Funding is Live.",
            "Bypass the noise. Get results.",
            "Limited private windows are open.",
            "Elite status requires elite action.",
            "Join the Central Bureau Fund."
        ];

        let sIndex = 0;
        let cIndex = 0;
        let isDeleting = false;
        
        function typeAction() {
            const target = document.getElementById("typed-target");
            const currentSentence = sentences[sIndex];

            if (isDeleting) {
                target.textContent = currentSentence.substring(0, cIndex - 1);
                cIndex--;
            } else {
                target.textContent = currentSentence.substring(0, cIndex + 1);
                cIndex++;
            }

            // Typing speed logic
            let speed = isDeleting ? 30 : 75; // Fast delete, smooth type

            if (!isDeleting && cIndex === currentSentence.length) {
                isDeleting = true;
                setTimeout(typeAction, 2000); // 2s pause at end
            } else if (isDeleting && cIndex === 0) {
                isDeleting = false;
                sIndex = (sIndex + 1) % sentences.length;
                setTimeout(typeAction, 500);
            } else {
                setTimeout(typeAction, speed);
            }
        }
        typeAction();
    })();
</script>
</body>
</html>
