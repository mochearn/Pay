<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn Catalyst | Product Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --banker-blue: #007bff;
            --mochearn-green: #28a745;
            --text-dark: #111111;
            --bg-body: #ffffff;
            --strong-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            margin: 0; padding: 0;
            color: var(--text-dark);
        }

        /* HEADER - FIXED POSITIONING */
        .header {
            padding: 18px 5%;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .header h1 { font-size: 1.1rem; font-weight: 900; margin: 0; text-transform: uppercase; }

        .container { width: 92%; margin: 20px auto; }

        .asset-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .asset-title { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; margin: 0; }

        /* REAL SEARCH BAR */
        .search-container { position: relative; width: 100%; margin-bottom: 25px; }
        .search-input {
            width: 100%; padding: 14px 14px 14px 45px;
            border: 1.5px solid #eee; border-radius: 12px;
            font-size: 0.9rem; box-sizing: border-box; outline: none;
        }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #999; }

        /* PRODUCT CARD - PREMIUM DEPTH */
        .product-card {
            background: white; border-radius: 16px; padding: 20px;
            margin-bottom: 20px; box-shadow: var(--strong-shadow);
            display: flex; flex-direction: column;
        }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        
        /* TEXT DIFFERENTIATION */
        .product-name { 
            font-weight: 800; font-size: 0.8rem; margin: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%;
            color: var(--text-dark); 
        }

        .vendor-name { 
            font-weight: 700; font-size: 0.7rem; 
            color: var(--mochearn-green); margin-bottom: 15px; 
            text-transform: uppercase;
        }

        /* ACTIVE BADGE - CORRECT GREEN WITH OPACITY */
        .badge { font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 5px; text-transform: uppercase; }
        .badge-active { background: rgba(40, 167, 69, 0.15); color: #1e7e34; }
        .badge-locked { background: #f0f0f0; color: #888; }

        /* LINK BAR */
        .link-bar {
            background: #f9f9f9; border: 1px solid #eee; border-radius: 10px;
            padding: 8px 12px; display: flex; align-items: center; gap: 10px;
        }
        .link-scroll { flex-grow: 1; overflow-x: auto; white-space: nowrap; }
        .link-scroll::-webkit-scrollbar { height: 0px; }
        
        /* LINK TEXT - BLACK & PROFESSIONAL */
        .link-text { font-size: 0.75rem; color: #000; font-weight: 600; }

        .copy-btn {
            background: var(--banker-blue); color: white; border: none;
            padding: 8px 15px; border-radius: 8px; font-weight: 800;
            cursor: pointer; font-size: 0.7rem; flex-shrink: 0;
        }

        /* ENROLL BUTTON - PERMANENT GREEN & BLACK TEXT */
        .enroll-btn {
            width: 100%; margin-top: 15px; padding: 15px;
            background: var(--mochearn-green); color: #000;
            border: none; border-radius: 12px; font-weight: 800;
            font-size: 0.9rem; text-transform: uppercase; cursor: pointer;
        }

        /* FLOATING TOAST POPUP */
        .toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; padding: 12px 25px;
            border-radius: 30px; font-size: 0.8rem; font-weight: 700;
            z-index: 9999; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .toast.show { top: 25px; }
    </style>
</head>
<body>

    <div id="copy-toast" class="toast">LINK COPIED! GO AND CASH OUT 💰</div>

    <div class="header">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <h1>Products</h1>
    </div>

    <div class="container">
        <div class="asset-row">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--banker-blue)" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            <h2 class="asset-title">Catalyst Assets</h2>
        </div>

        <div class="search-container">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="productSearch" class="search-input" placeholder="Search for a product..." onkeyup="filterProducts()">
        </div>

        <div id="productList">
            <div class="product-card">
                <div class="card-top">
                    <p class="product-name">THE J-SYSTEM MASTERCLASS 2026</p>
                    <span class="badge badge-active">Active</span>
                </div>
                <div class="vendor-name">By Mochearn Official</div>
                <div class="link-bar">
                    <div class="link-scroll"><span class="link-text" id="link1">https://mochearn.com/ref/auth/jsystem_bethuel_2026</span></div>
                    <button class="copy-btn" onclick="copyLink('link1')">COPY</button>
                </div>
            </div>

            <div class="product-card">
                <div class="card-top">
                    <p class="product-name">GRAPHIC DESIGN MASTERY PRO</p>
                    <span class="badge badge-locked">Locked</span>
                </div>
                <div class="vendor-name">By Creative Hub Int.</div>
                <button class="enroll-btn">Enroll to Promote</button>
            </div>
        </div>
    </div>

    <script>
        // REAL SEARCH LOGIC 🔍
        function filterProducts() {
            let input = document.getElementById('productSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getElementsByClassName('product-name')[0].innerText.toLowerCase();
                cards[i].style.display = name.includes(input) ? "flex" : "none";
            }
        }

        // BULLETPROOF COPY LOGIC 🛡️
        function copyLink(id) {
            const text = document.getElementById(id).innerText;
            const elem = document.createElement('textarea');
            elem.value = text;
            document.body.appendChild(elem);
            elem.select();
            document.execCommand('copy');
            document.body.removeChild(elem);

            const toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }
    </script>
</body>
    </html>
