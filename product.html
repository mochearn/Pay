<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn | Premium Product Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --banker-blue: #007bff;
            --text-dark: #1a1a1a;
            --text-muted: #888;
            --bg-pure-white: #ffffff;
            --soft-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-pure-white);
            margin: 0; padding: 0;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER AREA */
        .header {
            padding: 15px 5%;
            background: white;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .container { width: 92%; margin: 20px auto; }

        /* THE BOLD TITLE WITH SVG SHIELD */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .page-title { 
            font-weight: 900; 
            font-size: 1.1rem; 
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
        }

        /* SLIM PRODUCT CARD 📏 */
        .product-card {
            background: white;
            border-radius: 12px;
            padding: 12px 18px; /* Tight padding for short height */
            margin-bottom: 12px;
            box-shadow: var(--soft-shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        /* SMALL, LONG TEXT ON ONE LINE */
        .product-name { 
            font-weight: 800; 
            font-size: 0.85rem; 
            margin: 0;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 70%; /* Keeps it from hitting the badge */
        }

        .badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .badge-active { background: #eefdf5; color: #28a745; }
        .badge-locked { background: #f8f9fa; color: #999; }

        .vendor-name { 
            font-weight: 600; 
            font-size: 0.7rem; 
            color: #28a745; 
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* SCROLLABLE LINK BOX - COMPACT */
        .link-bar {
            background: #f9f9f9;
            border-radius: 6px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .link-scroll {
            flex-grow: 1;
            overflow-x: auto;
            white-space: nowrap;
        }
        
        .link-scroll::-webkit-scrollbar { height: 0px; } /* Hidden but scrollable */

        .link-text { 
            font-size: 0.75rem; 
            color: #666; 
            font-family: monospace; 
        }

        .copy-btn {
            background: var(--banker-blue);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .locked-btn {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #ddd;
            border-radius: 6px;
            color: #999;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <h1 style="font-size: 0.9rem; font-weight: 900; margin: 0;">MARKETPLACE</h1>
    </div>

    <div class="container">
        
        <div class="section-header">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--banker-blue)" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            <h2 class="page-title">Catalyst Assets</h2>
        </div>

        <div class="product-card">
            <div class="card-top-row">
                <p class="product-name">THE J-SYSTEM MASTERCLASS FOR DIGITAL ENTREPRENEURS</p>
                <span class="badge badge-active">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Active
                </span>
            </div>
            <div class="vendor-name">By Mochearn Official</div>
            
            <div class="link-bar">
                <div class="link-scroll">
                    <span class="link-text" id="link1">https://mochearn.com/catalyst/access/ref_id=bethuel_odakwaji_jsystem_2026_premium</span>
                </div>
                <button class="copy-btn" onclick="copyAction('link1', this)">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    COPY
                </button>
            </div>
        </div>

        <div class="product-card">
            <div class="card-top-row">
                <p class="product-name">GRAPHIC DESIGN MASTERY AND BRANDING STRATEGY 2026</p>
                <span class="badge badge-locked">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Locked
                </span>
            </div>
            <div class="vendor-name">By Creative Hub Int.</div>
            <button class="locked-btn">Enroll to Promote</button>
        </div>

    </div>

    <script>
        async function copyAction(id, btn) {
            const text = document.getElementById(id).innerText;
            try {
                await navigator.clipboard.writeText(text);
                const originalText = btn.innerHTML;
                btn.innerText = "COPIED!";
                btn.style.background = "#28a745";
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = "#007bff";
                }, 1500);
            } catch (err) { console.error("Copy failed"); }
        }
    </script>
</body>
    </html>
