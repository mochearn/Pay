<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn | Product Room</title>
    <style>
        :root {
            --banker-blue: #007bff;
            --border-gray: #dee2cf;
            --text-dark: #222;
            --text-light: #777;
            --bg-light: #f8f9fa;
            --locked-gray: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-light);
            margin: 0; padding: 0;
        }

        .header {
            padding: 25px 5%;
            background: white;
            border-bottom: 2px solid var(--border-gray);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .container { width: 90%; margin: 25px auto; }

        .page-title { font-weight: 900; font-size: 1.6rem; text-transform: uppercase; margin-bottom: 20px; }

        /* PRODUCT CARD */
        .product-card {
            background: white;
            border: 2px solid var(--border-gray);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .badge {
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: inline-block;
        }

        .badge-active { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .badge-locked { background: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }

        .product-name { font-weight: 900; font-size: 1.3rem; margin: 0 0 5px 0; }
        .vendor-name { color: #28a745; font-weight: 700; font-size: 0.8rem; margin-bottom: 15px; }

        /* THE LINK BOX */
        .link-container {
            background: #f1f3f5;
            border: 1.5px solid var(--border-gray);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 15px;
        }

        .link-text { font-size: 0.85rem; color: #555; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        .copy-btn {
            background: var(--banker-blue);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .locked-overlay {
            color: var(--text-light);
            font-style: italic;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <h1 style="font-size: 1.2rem; font-weight: 900; margin: 0;">PRODUCTS</h1>
    </div>

    <div class="container">
        <div class="page-title">Available Products 🏛️</div>

        <div class="product-card">
            <span class="badge badge-active">Active</span>
            <div class="product-name">THE J-SYSTEM MASTERCLASS</div>
            <div class="vendor-name">BY MOCHEARN</div>
            
            <p style="font-size: 0.9rem; color: #666;">Copy your unique link below to start promoting and earning commissions.</p>
            
            <div class="link-container">
                <span class="link-text">https://mochearn.com/ref/bethuel_jsys_01</span>
                <button class="copy-btn" onclick="copyLink()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    COPY
                </button>
            </div>
        </div>

        <div class="product-card" style="opacity: 0.8;">
            <span class="badge badge-locked">Locked</span>
            <div class="product-name">GRAPHIC DESIGN PRO</div>
            <div class="vendor-name">BY CREATIVE HUB</div>
            
            <div class="locked-overlay">
                🔒 Purchase this product to unlock your catalyst link.
            </div>
            
            <button style="width: 100%; margin-top: 15px; padding: 12px; border: 2px solid var(--banker-blue); color: var(--banker-blue); background: transparent; border-radius: 8px; font-weight: 800; cursor: pointer;">
                ENROLL TO PROMOTE
            </button>
        </div>

    </div>

    <script>
        function copyLink() {
            alert("Correct! Link copied to clipboard. Go and cash out! 💰");
        }
    </script>

</body>
        </html>
