<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Vault | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #050a18; 
            color: #ffffff; 
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 850px; 
            margin: 0 auto;
            padding: 60px 20px;
        }

        .hub-title {
            font-family: 'Montserrat', sans-serif;
            color: #00ff88;
            text-align: center;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* PRODUCT ROW */
        .product-row {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 12px;
            padding: 25px;
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            align-items: flex-start;
        }

        /* LEFT STACK */
        .image-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 110px;
            align-items: center;
        }

        .product-img {
            width: 110px;
            height: 110px;
            border-radius: 8px;
            object-fit: cover;
            border: 3px solid #00ff88;
        }

        .vendor-img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.3);
        }

        /* CENTER INFO */
        .info-block {
            flex-grow: 1;
        }

        .p-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .v-name {
            display: block;
            font-size: 0.85rem;
            color: #00ff88;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* DESCRIPTION LOGIC */
        .desc-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #bbbbbb;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out;
        }

        .desc-text.expanded {
            display: block;
            -webkit-line-clamp: unset;
            max-height: 3000px;
        }

        .toggle-btn {
            color: #00ff88;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            background: none;
            border: none;
            margin-top: 10px;
        }

        /* RIGHT BLOCK */
        .action-block {
            text-align: right;
            min-width: 160px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .price-area {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 30px;
            font-weight: 800;
        }

        .cmd-btn {
            background: #00ff88;
            color: #050a18;
            text-decoration: none;
            padding: 14px 22px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            text-align: center;
        }

        #empty-notice { display: none; text-align: center; padding: 120px 20px; color: #555; }

        @media (max-width: 700px) {
            .product-row { flex-direction: column; align-items: center; text-align: center; }
            .action-block { text-align: center; min-width: 100%; margin-top: 25px; }
            .image-stack { flex-direction: row; width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="hub-title">The Vault 💎</h1>
        <div id="product-list"></div>
        <div id="empty-notice"><p>No available products yet.</p></div>
    </div>

    <script>
        // TEST PRODUCT ADDED HERE
        const products = [
            {
                name: "The J-System Elite",
                vendor: "Jonard Bethuel",
                desc: "This is a long description to test the 3-line rule. Mochearn is all about quality over quantity. This blueprint covers everything from digital asset management to global sales scaling. By the time you finish reading this, you should realize that the system is built for speed and high performance. If this text is longer than three lines, it will cut off until you press see more. Once you press it, the card expands to show all this extra information that was hidden before!",
                price: "₦5,000",
                showPrice: true,
                pImg: "https://images.unsplash.com/photo-1553729459-efe14ef6055d?w=300",
                vImg: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150"
            }
        ];

        const list = document.getElementById('product-list');
        const emptyNotice = document.getElementById('empty-notice');

        if (products.length === 0) {
            emptyNotice.style.display = 'block';
        } else {
            products.forEach((p, index) => {
                list.innerHTML += `
                    <div class="product-row">
                        <div class="image-stack">
                            <img src="${p.pImg}" class="product-img">
                            <img src="${p.vImg}" class="vendor-img">
                        </div>
                        <div class="info-block">
                            <h2 class="p-name">${p.name}</h2>
                            <span class="v-name">Vendor: ${p.vendor}</span>
                            <p class="desc-text" id="desc-${index}">${p.desc}</p>
                            <button class="toggle-btn" id="btn-${index}" onclick="handleToggle(${index})">... see more</button>
                        </div>
                        <div class="action-block">
                            <div class="price-area">${p.price}</div>
                            <a href="#" class="cmd-btn">COMMAND 💎</a>
                        </div>
                    </div>
                `;
            });
        }

        function handleToggle(id) {
            const textElement = document.getElementById(`desc-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            if (textElement.classList.contains('expanded')) {
                textElement.classList.remove('expanded');
                btn.innerText = "... see more";
            } else {
                textElement.classList.add('expanded');
                btn.innerText = "see less ↑";
            }
        }
    </script>
</body>
    </html>
