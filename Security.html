<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn | Security Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --banker-blue: #007bff;
            --mochearn-green: #28a745;
            --danger-red: #dc3545;
            --text-dark: #111111;
            --bg-body: #ffffff;
            --strong-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); margin: 0; color: var(--text-dark); }
        .header { padding: 18px 5%; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #f0f0f0; }
        .header h1 { font-size: 1rem; font-weight: 900; margin: 0; text-transform: uppercase; }
        .container { width: 92%; margin: 25px auto; padding-bottom: 80px; }

        .section-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .section-title { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; margin: 0; }

        .security-card { background: white; border-radius: 16px; padding: 25px; box-shadow: var(--strong-shadow); margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 0.75rem; font-weight: 800; color: #666; text-transform: uppercase; margin-bottom: 8px; display: block; }

        .styled-input {
            width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 10px;
            font-size: 0.9rem; font-weight: 600; box-sizing: border-box; outline: none;
        }

        /* FLUID PIN BOXES */
        .pin-box { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .pin-digit {
            width: 50px; height: 55px; text-align: center; font-size: 1.5rem;
            font-weight: 800; border: 1.5px solid #eee; border-radius: 10px; outline: none;
        }

        .action-btn {
            width: 100%; margin-top: 10px; padding: 16px; background: var(--banker-blue);
            color: white; border: none; border-radius: 12px; font-weight: 900;
            font-size: 0.9rem; text-transform: uppercase; cursor: pointer;
        }

        .deactivate-btn {
            background: rgba(220, 53, 69, 0.05); color: var(--danger-red);
            border: 1.5px solid rgba(220, 53, 69, 0.2); margin-top: 20px;
        }

        .toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #111; color: #fff; padding: 12px 25px; border-radius: 30px;
            font-size: 0.8rem; font-weight: 700; z-index: 9999; transition: top 0.4s ease;
        }
        .toast.show { top: 25px; }
    </style>
</head>
<body>

    <div id="security-toast" class="toast">SECURITY UPDATED SUCCESSFULLY 🛡️</div>

    <div class="header">
        <svg onclick="history.back()" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="cursor:pointer;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <h1>Security Vault</h1>
    </div>

    <div class="container">
        <div class="section-row">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--banker-blue)" stroke-width="2.5"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3L15.5 7.5z"></path></svg>
            <h2 class="section-title">Change Password</h2>
        </div>

        <div class="security-card">
            <div class="input-group">
                <label class="input-label">Current Password</label>
                <input type="password" class="styled-input pass-field" placeholder="••••••••">
            </div>
            <div class="input-group">
                <label class="input-label">New Password</label>
                <input type="password" class="styled-input pass-field" placeholder="Create strong password">
            </div>
            <button class="action-btn" onclick="updateSecurity('Password')">Update Password</button>
        </div>

        <div class="section-row" style="margin-top: 40px;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--mochearn-green)" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <h2 class="section-title">Reset Transaction Pin</h2>
        </div>

        <div class="security-card">
            <label class="input-label" style="text-align: center;">Set New 4-Digit Vault Pin</label>
            <div class="pin-box">
                <input type="password" maxlength="1" class="pin-digit" oninput="moveFocus(this, 0)">
                <input type="password" maxlength="1" class="pin-digit" oninput="moveFocus(this, 1)">
                <input type="password" maxlength="1" class="pin-digit" oninput="moveFocus(this, 2)">
                <input type="password" maxlength="1" class="pin-digit" oninput="moveFocus(this, 3)">
            </div>
            <button class="action-btn" style="background: var(--mochearn-green); margin-top: 25px;" onclick="updateSecurity('Vault Pin')">Lock New Pin</button>
        </div>

        <div class="section-row" style="margin-top: 40px;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--danger-red)" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            <h2 class="section-title">Danger Zone</h2>
        </div>

        <div class="security-card">
            <p style="font-size: 0.8rem; color: #666; font-weight: 600; margin: 0;">Once you deactivate your account, your Catalyst access will be suspended and all pending commissions will be frozen.</p>
            <button class="action-btn deactivate-btn">Deactivate Account</button>
        </div>
    </div>

    <script>
        // AUTO-JUMP PIN LOGIC 🏎️
        const pins = document.querySelectorAll('.pin-digit');
        function moveFocus(el, index) {
            if (el.value.length === 1 && index < 3) {
                pins[index + 1].focus();
            }
        }

        function updateSecurity(type) {
            const toast = document.getElementById('security-toast');
            toast.innerText = `${type.toUpperCase()} UPDATED SECURELY 🛡️`;
            toast.classList.add('show');

            // WIPE ALL FIELDS 🧹
            pins.forEach(p => p.value = '');
            document.querySelectorAll('.pass-field').forEach(f => f.value = '');
            
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }
    </script>
</body>
</html>
