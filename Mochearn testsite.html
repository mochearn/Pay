<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyst Dashboard | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #ffffff; color: #333; }

        /* --- THE TOP BAR (RECONSTRUCTED) --- */
        .header-main {
            display: flex; justify-content: space-between; align-items: flex-end; /* Aligns items to the bottom line */
            padding: 15px 20px 8px; /* Bottom padding keeps text near the line */
            border-bottom: 1.5px solid #eee; 
            background: #fff;
        }

        .left-wing { display: flex; align-items: flex-end; gap: 10px; }
        .hamburger-icon { padding-bottom: 2px; cursor: pointer; }
        .mochearn-logo { width: 38px; height: 38px; margin-bottom: -4px; }
        .brand-text { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            color: #000;
            margin-bottom: -2px; /* Rests it on the line */
        }

        /* NEW RANK POSITION: Far Right of the Top Bar */
        .right-wing-rank { 
            display: flex; flex-direction: column; align-items: center; 
            margin-bottom: -5px; 
        }
        #topRankIcon { width: 45px; height: 45px; } /* Smaller size to fit the top bar */
        .rank-tag { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 0.5rem; color: #00ff88; 
            font-weight: 900; margin-top: -8px;
        }

        /* --- WELCOME AREA (CLEANED) --- */
        .welcome-section { padding: 40px 20px; }
        .welcome-section h1 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; text-transform: uppercase; }
        .user-highlight { color: #0088cc; }
        #auto-messenger { font-size: 0.9rem; color: #888; margin-top: 10px; transition: 0.5s; }

    </style>
</head>
<body>

    <header class="header-main">
        <div class="left-wing">
            <div class="hamburger-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
            <img src="mochearn-logo.png" alt="Logo" class="mochearn-logo">
            <span class="brand-text">Catalyst Dashboard</span>
        </div>

        <div class="right-wing-rank">
            <div id="topRankIcon">
                <svg viewBox="0 0 100 100"><path d="M50 5 L90 20 L90 60 L50 95 L10 60 L10 20 Z" fill="none" stroke="#ddd" stroke-width="4"></path></svg>
            </div>
            <span class="rank-tag" id="rankTitle">INITIATE</span>
        </div>
    </header>

    <div class="welcome-section">
        <h1>WELCOME BACK, <span class="user-highlight">BETHUEL</span></h1>
        <p id="auto-messenger">Scanning your empire...</p>
    </div>

    <script>
        // 1. THE 7-SECOND AUTOMATIC SCANNER
        const messages = [
            "Let's build your empire today, Bethuel.",
            "You are 5 sales away from RISING STAR! 🚀",
            "Your weekly conversion is up 12% 📊",
            "Check the command center for new tasks. 🎁"
        ];
        
        let i = 0;
        setInterval(() => {
            const el = document.getElementById('auto-messenger');
            el.style.opacity = 0;
            setTimeout(() => {
                i = (i + 1) % messages.length;
                el.innerText = messages[i];
                el.style.opacity = 1;
            }, 500);
        }, 7000);

        // 2. RANK LOGIC (DESIGNED SVG)
        function setTopRank(sales) {
            const container = document.getElementById('topRankIcon');
            const title = document.getElementById('rankTitle');
            if (sales < 20) {
                container.innerHTML = `<svg viewBox="0 0 100 100"><path d="M50 5 L90 20 L90 60 L50 95 L10 60 L10 20 Z" fill="none" stroke="#ddd" stroke-width="6"></path></svg>`;
                title.innerText = 'INITIATE';
            }
            // Add other SVG designs for 50, 80, 120 here...
        }
        setTopRank(15);
    </script>
</body>
                                                                                                                                                       </html>
