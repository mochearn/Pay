<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn Catalyst Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #ffffff; color: #333; overflow-x: hidden; }

        /* --- 1. THE STRAIGHT-LINE HEADER --- */
        .header-main {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 15px 25px 10px; border-bottom: 1.5px solid #eee;
            position: relative;
        }

        .brand-block { display: flex; flex-direction: column; align-items: flex-start; }
        .mochearn-logo { width: 40px; height: 40px; margin-bottom: 5px; margin-left: 5px; } /* Sits high on top */
        
        .title-row { display: flex; align-items: center; gap: 10px; }
        .hamburger { cursor: pointer; padding-bottom: 2px; }
        .dashboard-title { 
            font-family: 'Montserrat', sans-serif; font-size: 1.1rem; 
            text-transform: uppercase; white-space: nowrap; /* Forces straight line */
            letter-spacing: 0.5px;
        }

        /* --- 2. THE EXPENSIVE RANK (RIGHT SIDE) --- */
        .rank-wing { display: flex; flex-direction: column; align-items: center; margin-bottom: -5px; }
        
        .rank-crest { 
            width: 55px; height: 55px; 
            animation: rankPulse 2s infinite ease-in-out; /* Live Animation */
        }
        .rank-word { 
            font-family: 'Montserrat', sans-serif; font-size: 0.6rem; 
            color: #00ff88; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; margin-top: -10px;
        }

        @keyframes rankPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- 3. THE WELCOME CENTER --- */
        .welcome-area { padding: 45px 25px; }
        
        .welcome-msg { 
            font-family: 'Montserrat', sans-serif; font-size: 1.8rem; 
            text-transform: uppercase; opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.8s forwards; /* Entrance Animation */
        }
        .user-blue { color: #0088cc; }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        #status-report { 
            font-size: 0.9rem; color: #888; margin-top: 10px; 
            transition: opacity 0.5s; 
        }

    </style>
</head>
<body>

    <header class="header-main">
        <div class="brand-block">
            <img src="mochearn-logo.png" alt="Logo" class="mochearn-logo">
            <div class="title-row">
                <div class="hamburger">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </div>
                <span class="dashboard-title">Catalyst Dashboard</span>
            </div>
        </div>

        <div class="rank-wing">
            <div class="rank-crest" id="rankIcon">
                <svg viewBox="0 0 100 100"><path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z" fill="none" stroke="#ddd" stroke-width="4"></path></svg>
            </div>
            <span class="rank-word" id="rankLabel">PREMIER</span>
        </div>
    </header>

    <div class="welcome-area">
        <h1 class="welcome-msg" id="loginGreeting">
            WELCOME BACK, <span class="user-blue">BETHUEL</span>
        </h1>
        <p id="status-report">Initializing secure connection...</p>
    </div>

    <script>
        // A. TRIPLE-THREAT WELCOME LOGIC
        const greetings = [
            'WELCOME BACK, <span class="user-blue">BETHUEL</span>',
            'SALUTE, <span class="user-blue">BETHUEL</span>',
            'READY TO EARN, <span class="user-blue">BETHUEL</span>'
        ];
        
        // Randomly pick one on every login/refresh
        document.getElementById('loginGreeting').innerHTML = greetings[Math.floor(Math.random() * greetings.length)];

        // B. EXPENSIVE ONE-WORD RANK ENGINE
        function applyRank(sales) {
            const icon = document.getElementById('rankIcon');
            const label = document.getElementById('rankLabel');
            
            if (sales < 20) {
                label.innerText = 'PREMIER';
                icon.innerHTML = `<svg viewBox="0 0 100 100"><path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z" fill="none" stroke="#ddd" stroke-width="5"></path></svg>`;
            } else if (sales < 50) {
                label.innerText = 'ELITE';
                icon.innerHTML = `<svg viewBox="0 0 100 100"><path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z" fill="none" stroke="#0088cc" stroke-width="6"></path></svg>`;
            }
            // Add other ranks (VANGUARD, EXALTED, LEGEND) here
        }
        applyRank(15); // Testing Rank 1

        // C. RESTORED MESSAGE SCANNER (7 SECONDS)
        const reports = [
            "Check the command center for new tasks. 🎁",
            "You are 5 sales away from ELITE status! 🚀",
            "Your empire is growing—12% increase today. 📈",
            "Earnings are ready for verification. 💰"
        ];
        
        let reportIndex = 0;
        setInterval(() => {
            const msg = document.getElementById('status-report');
            msg.style.opacity = 0;
            setTimeout(() => {
                reportIndex = (reportIndex + 1) % reports.length;
                msg.innerText = reports[reportIndex];
                msg.style.opacity = 1;
            }, 500);
        }, 7000);

    </script>
    <style>
    #intel-hub-container {
        width: 100%;
        display: flex;
        justify-content: center;
        /* This ensures the box stays a set distance from the top, regardless of text above */
        padding-top: 10px; 
    }

    #intel-hub { 
        width: 90%;
        max-width: 330px; 
        /* Expensive Dark Theme: 80% Opacity */
        background: rgba(18, 18, 18, 0.8); 
        backdrop-filter: blur(5px); /* Adds a glass-like feel */
        border: 1px solid rgba(255, 255, 255, 0.1); 
        border-radius: 14px; 
        
        /* Increased Height but Elastic */
        min-height: 55px; 
        padding: 12px 16px;
        
        display: flex; 
        align-items: center; 
        gap: 12px; 
        transition: transform 0.3s ease, opacity 0.3s ease;
        box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .hub-hidden { 
        display: none !important; 
    } 

    .hub-content { 
        flex-grow: 1; 
        font-size: 0.82rem; 
        font-weight: 500; 
        color: #ffffff; /* White text for the dark box */
        line-height: 1.4;
        word-wrap: break-word; /* Ensures long text expands the box */
    }

    .audio-icon { 
        cursor: pointer; 
        font-size: 1.2rem; 
        display: none; 
        filter: drop-shadow(0 0 5px rgba(0, 255, 136, 0.5));
    }

    .close-hub-btn { 
        cursor: pointer; 
        font-size: 1.4rem; 
        color: rgba(255, 255, 255, 0.4); 
        line-height: 1; 
        display: none;
    }

    .close-hub-btn:hover { color: #ff5555; }

    /* The "Live" glow for broadcasts */
    .urgent-glow { border: 1px solid #00ff88 !important; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
</style>

<div id="intel-hub-container">
    <div id="intel-hub">
        <div class="audio-icon" id="hubAudio">🔊</div>
        <div class="hub-content" id="hubMessageText">
            Mochearn Systems: All Engines Nominal.
        </div>
        <div class="close-hub-btn" id="hubClose" onclick="dismissIntelligenceHub()">×</div>
    </div>
</div>

<script>
    function setIntelligenceHub(text, hasAudio = false, isUrgent = false) {
        const hub = document.getElementById('intel-hub');
        const msg = document.getElementById('hubMessageText');
        const xBtn = document.getElementById('hubClose');
        const audio = document.getElementById('hubAudio');

        hub.classList.remove('hub-hidden');
        msg.innerText = text;

        if (text === "Mochearn Systems: All Engines Nominal.") {
            xBtn.style.display = "block";
            audio.style.display = "none";
            hub.classList.remove('urgent-glow');
        } else {
            xBtn.style.display = "none";
            audio.style.display = hasAudio ? "block" : "none";
            if(isUrgent) hub.classList.add('urgent-glow');
        }
    }

    function dismissIntelligenceHub() {
        document.getElementById('intel-hub').classList.add('hub-hidden');
    }

    // Default state
    setIntelligenceHub("Mochearn Systems: All Engines Nominal.");
</script>
</body>
                        </html>
