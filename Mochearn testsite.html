<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyst Dashboard | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #ffffff; color: #333; overflow-x: hidden; }

        /* --- 1. TOP NAVIGATION BAR --- */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; border-bottom: 1px solid #f0f0f0; background: #fff;
        }

        .brand-section { display: flex; align-items: center; gap: 10px; }
        .mochearn-logo { width: 35px; height: 35px; object-fit: contain; }
        .dashboard-title { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; letter-spacing: 1px; color: #999; text-transform: uppercase; }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-item { text-align: center; cursor: pointer; transition: 0.3s; text-decoration: none; color: #000; }
        .nav-item svg { width: 22px; height: 22px; display: block; margin: 0 auto 4px; stroke: #000; fill: none; stroke-width: 2; }
        .nav-item span { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
        .nav-item:hover { transform: translateY(-2px); color: #0088cc; }
        .nav-item:hover svg { stroke: #0088cc; }

        .profile-area { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00ff88; overflow: hidden; cursor: pointer; }
        .profile-area img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 2. THE WELCOME & STATUS PANEL --- */
        .status-panel { padding: 40px 30px; display: flex; justify-content: space-between; align-items: center; }

        .welcome-msg h1 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; text-transform: uppercase; color: #222; }
        .user-name { color: #0088cc; }
        #intelligent-messenger { font-size: 0.9rem; color: #777; margin-top: 8px; font-weight: 500; }

        .award-crest { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        #prestigeIcon { width: 80px; height: 80px; object-fit: contain; transition: 0.5s; }
        .rank-label { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: #00ff88; font-weight: 900; }

        @media (max-width: 768px) {
            .nav-links { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 15px; border-top: 1px solid #eee; justify-content: space-around; z-index: 1000; }
            .status-panel { flex-direction: column; text-align: center; gap: 30px; }
            .welcome-msg h1 { font-size: 1.4rem; }
            .award-crest { order: -1; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="brand-section">
            <img src="mochearn-logo.png" alt="M" class="mochearn-logo">
            <span class="dashboard-title">Catalyst Dashboard</span>
        </div>

        <div class="nav-links">
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
                <span>Wallet</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                <span>Network</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span>Settings</span>
            </a>
        </div>

        <div class="profile-area">
            <img src="" id="displayProfile" alt="User Avatar">
        </div>
    </nav>

    <div class="status-panel">
        <div class="welcome-msg">
            <h1>WELCOME BACK, <span id="userName" class="user-name">BETHUEL</span></h1>
            <p id="intelligent-messenger">Wait for it... the magic is scanning your dashboard.</p>
        </div>

        <div class="award-crest">
            <img src="initiate-shield.png" id="prestigeIcon" alt="Rank Icon">
            <span class="rank-label" id="rankTitle">INITIATE CATALYST</span>
        </div>
    </div>

    <script>
        /* --- 1. THE PERMANENT AVATAR LOCK --- */
        // Logic: Checks onboarding answer once. Stays until photo upload.
        function setupUserIdentity(gender, userHasPhoto, photoUrl) {
            const display = document.getElementById('displayProfile');
            if (userHasPhoto) {
                display.src = photoUrl;
            } else {
                // Permanently sets avatar based on gender key from onboarding
                display.src = (gender === 'female') ? 'female-avatar.png' : 'male-avatar.png';
            }
        }

        /* --- 2. THE RANKING ENGINE (THE SALES MAGIC) --- */
        // COPY THIS PART TO ADJUST YOUR RULES
        function updateUserRank(sales) {
            const icon = document.getElementById('prestigeIcon');
            const title = document.getElementById('rankTitle');

            if (sales < 20) {
                icon.src = 'shield-initiate.png';
                title.innerText = 'INITIATE CATALYST';
            } else if (sales < 50) {
                icon.src = 'star-rising.png';
                title.innerText = 'RISING STAR';
            } else if (sales < 80) {
                icon.src = 'hexagon-elite.png';
                title.innerText = 'ELITE COMMANDER';
            } else if (sales < 120) {
                icon.src = 'diamond-master.png';
                title.innerText = 'DIAMOND MASTER';
            } else {
                icon.src = 'crown-legend.png';
                title.innerText = 'EMPIRE LEGEND';
            }
        }

        /* --- 3. THE INTELLIGENT MESSENGER (ACTIVITY SCANNER) --- */
        let activityCount = 0; // You will link this to real user clicks
        const msgElement = document.getElementById('intelligent-messenger');

        function runMagicScanner(sales, balance) {
            activityCount++;
            
            // Logic: Normal encouragement for first 3 moves
            if (activityCount < 4) {
                msgElement.innerText = "Let's build your empire today, " + document.getElementById('userName').innerText + ".";
            } 
            // Logic: The "Magic" Scanner wakes up at activity 4
            else {
                if (sales < 20) {
                    msgElement.innerText = "🚀 You're doing great! Just " + (20 - sales) + " more sales to reach RISING STAR.";
                } else if (balance > 10000) {
                    msgElement.innerText = "💰 Your wallet is heavy! Ready to check your withdrawal options?";
                } else {
                    msgElement.innerText = "🔥 The market is hot right now. Keep pushing those links!";
                }
            }
        }

        // INITIALIZE THE SYSTEM (Example Data)
        setupUserIdentity('male', false, ''); 
        updateUserRank(15); // Current Sales
        
        // Simulating the user moving around the dashboard
        // After 4 clicks, the message will change automatically!
        window.onclick = () => runMagicScanner(15, 5000); 

    </script>
</body>
                    </html>
