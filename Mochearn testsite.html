<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Dashboard | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background-color: #ffffff; color: #333; }

        /* --- THE NEW KINGDOM TOP PANEL --- */
        .kingdom-header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0; /* Ultra-subtle line */
        }

        /* 1. LEFT SIDE: PROFILE & MENU */
        .left-panel { display: flex; align-items: center; gap: 15px; }

        .menu-logo-stack { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
        
        .hamburger-menu { font-size: 1.3rem; cursor: pointer; color: #000; }
        .platform-logo { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; text-transform: uppercase; color: #000; }

        /* DYNAMIC PROFILE PICTURE WITH DEFAULT AVATAR */
        .profile-wrapper { position: relative; width: 60px; height: 60px; }
        .user-pic {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00ff88; /* Matches your Green Rank highlight */
        }

        /* 2. MIDDLE SIDE: THE WELCOME MSG */
        .welcome-stack { flex: 1; margin-left: 20px; text-align: left; }
        
        .welcome-stack h1 { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.4rem; 
            text-transform: uppercase; 
            color: #333;
        }
        .user-name { color: #0088cc; font-weight: bold; } /* Light Blue */
        
        /* ROLLING WELCOME MESSAGE */
        #guidance-text { font-size: 0.8rem; color: #888; margin-top: 5px; min-height: 1rem; transition: opacity 0.3s; }

        /* 3. RIGHT SIDE: DYNAMIC ACHIEVEMENTS */
        .achievement-panel {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }
        
        /* THE RANK ICON (e.g., DIAMOND) */
        #rankIcon { width: 50px; height: 50px; }
        
        .rank-title { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; color: #666; }
        .rank-label { color: #00ff88; font-weight: 800; font-size: 0.8rem; }

        /* MOBILE RESPONSIVE */
        @media (max-width: 600px) {
            .kingdom-header { padding: 15px; flex-wrap: wrap; }
            .left-panel { order: 1; }
            .achievement-panel { order: 2; margin-left: auto; }
            .welcome-stack { order: 3; width: 100%; text-align: center; margin-left: 0; margin-top: 15px; border-top: 1px solid #f9f9f9; padding-top: 10px; }
            .welcome-stack h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <header class="kingdom-header">
        
        <div class="left-panel">
            <div class="menu-logo-stack">
                <div class="hamburger-menu">☰</div>
                <div class="platform-logo">MOCHEARN</div>
            </div>
            
            <div class="profile-wrapper">
                <img src="" id="userPic" alt="User Profile" class="user-pic">
            </div>
        </div>

        <div class="achievement-panel">
            <div class="rank-title">CURRENT STATUS</div>
            
            <img src="level1-circle.png" id="rankIcon" alt="Diamond Level">
            
            <div class="rank-label" id="rankName">DIAMOND CATALYST</div>
        </div>

        <div class="welcome-stack">
            <h1>WELCOME BACK, <span class="user-name">BETHUEL</span></h1>
            <p id="guidance-text">Let's build your empire today.</p>
        </div>

    </header>

    <script>
        // --- THE KINGDOM INTELLIGENCE ENGINE v1.0 ---

        // A. Profile Picture System (Handles default avatars)
        function setProfilePic(userGender) {
            const pic = document.getElementById('userPic');
            // Check if the user has uploaded an actual image
            if (pic.getAttribute('src') === "") {
                const defaultAvatar = (userGender === 'female') ? 'female-avatar.png' : 'male-avatar.png';
                pic.setAttribute('src', defaultAvatar);
            }
        }
        
        // --- SETUP THE USER'S INFO (You connect this later) ---
        // userPic: Leave blank to use default
        setProfilePic('male'); 

        // B. Dynamic Rank System (Level-up Achievement)
        function updateLevelBySales(salesCount) {
            const icon = document.getElementById('rankIcon');
            const label = document.getElementById('rankName');
            
            if (salesCount < 40) {
                icon.setAttribute('src', 'level1-circle.png');
                label.innerText = 'BRONZE START ⚪';
                label.style.color = "#a1a1a1"; // Grey color for Level 1
            } else if (salesCount < 70) {
                icon.setAttribute('src', 'level2-star.png');
                label.innerText = 'STAR ACHIEVER ⭐';
                label.style.color = "#ff8800"; // Orange color for Level 2
            } else if (salesCount < 100) {
                icon.setAttribute('src', 'level3-diamond.png');
                label.innerText = 'DIAMOND CATALYST 💎';
                label.style.color = "#00ff88"; // Mochearn Green for Level 3
            } else {
                icon.setAttribute('src', 'level4-crown.png');
                label.innerText = 'EMPIRE KING 👑';
                label.style.color = "#cc8800"; // Gold color for Level 4
            }
        }
        
        // --- SETUP THE SALES DATA ---
        // Change this number to test the Level changes!
        updateLevelBySales(90); 

        // C. Rolling Guidance System
        const guidanceMessages = [
            "Let's build your empire today.",
            "You have 3 daily tasks waiting for you.",
            "Your referral Tunde just upgraded!",
            "Did you miss last week's webinar?"
        ];
        
        function rotateGuidance() {
            const msgElement = document.getElementById('guidance-text');
            let index = 0;
            
            setInterval(() => {
                index = (index + 1) % guidanceMessages.length;
                msgElement.style.opacity = 0; // Fade out
                setTimeout(() => {
                    msgElement.innerText = guidanceMessages[index];
                    msgElement.style.opacity = 1; // Fade in
                }, 300);
            }, 6000); // Changes every 6 seconds
        }

        rotateGuidance();
    </script>
</body>
  </html>
