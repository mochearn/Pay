<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn | Vendor Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --mochearn-blue: #007bff;
            --mochearn-gold: #ffc107;
            --bg-dark: #0a0a0a;
            --card-gray: #1a1a1a;
            --text-white: #ffffff;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-white); margin: 0; padding-bottom: 100px; }

        /* VENDOR TOP NAV */
        .v-nav { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .v-logo { font-weight: 900; font-size: 1.2rem; letter-spacing: -1px; }
        .v-profile { width: 35px; height: 35px; background: var(--mochearn-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; }

        .v-container { padding: 25px; }

        /* STATS GRID */
        .stats-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 30px; }
        .stat-card { 
            min-width: 160px; background: var(--card-gray); padding: 20px; 
            border-radius: 20px; border: 1px solid #333;
        }
        .stat-label { font-size: 0.65rem; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-val { font-size: 1.3rem; font-weight: 900; color: var(--text-white); }

        /* PRODUCT LIST */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-header h2 { font-size: 0.9rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #888; }
        
        .add-btn { 
            background: var(--mochearn-blue); color: white; border: none; padding: 10px 18px; 
            border-radius: 12px; font-weight: 800; font-size: 0.75rem; cursor: pointer;
        }

        .product-card {
            background: var(--card-gray); padding: 15px; border-radius: 20px; 
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border: 1px solid #222;
        }
        .p-img { width: 55px; height: 55px; background: #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .p-info { flex: 1; }
        .p-name { font-weight: 800; font-size: 0.9rem; margin-bottom: 3px; }
        .p-meta { font-size: 0.7rem; color: #666; font-weight: 600; }
        .p-status { font-size: 0.6rem; padding: 4px 8px; border-radius: 6px; font-weight: 900; text-transform: uppercase; }
        .s-live { background: rgba(40, 167, 69, 0.15); color: #28a745; }
    </style>
</head>
<body>

    <nav class="v-nav">
        <div class="v-logo">MOCHEARN <span style="color:var(--mochearn-blue)">VENDOR</span></div>
        <div class="v-profile">V</div>
    </nav>

    <div class="v-container">
        <div class="stats-scroll">
            <div class="stat-card">
                <div class="stat-label">Total Sales</div>
                <div class="stat-val">₦1.2M</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Catalysts</div>
                <div class="stat-val">428</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Units Sold</div>
                <div class="stat-val">89</div>
            </div>
        </div>

        <div class="section-header">
            <h2>Active Blueprints</h2>
            <button class="add-btn" onclick="alert('Launch Protocol Initiated')">+ NEW</button>
        </div>

        <div class="product-card">
            <div class="p-img">📚</div>
            <div class="p-info">
                <div class="p-name">The J-System Elite</div>
                <div class="p-meta">Commission: 50% | Price: ₦15,000</div>
            </div>
            <div class="p-status s-live">LIVE</div>
        </div>

        <div class="product-card">
            <div class="p-img">👟</div>
            <div class="p-info">
                <div class="p-name">Premium Footwear Vault</div>
                <div class="p-meta">Commission: 30% | Price: ₦45,000</div>
            </div>
            <div class="p-status s-live" style="background:rgba(255,193,7,0.1); color:#ffc107;">PENDING</div>
        </div>

    </div>

</body>
</html>
