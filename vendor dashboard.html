<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn | Vendor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --m-blue: #007bff;
            --m-bg: #f8f9fa;
            --m-dark: #111111;
            --m-gray: #6c757d;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--m-bg); 
            margin: 0; 
            padding: 0;
            color: var(--m-dark);
        }

        /* BLOCK 01: THE HEADER */
        .header-block {
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .profile-side {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-circle {
            width: 50px;
            height: 50px;
            background: #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--m-blue);
        }

        .greeting-text {
            display: flex;
            flex-direction: column;
        }

        .v-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--m-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .v-name {
            font-size: 1.1rem;
            font-weight: 900;
            margin-top: 2px;
        }

        .nav-icons {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            background: #f0f0f0;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header class="header-block">
        <div class="profile-side">
            <div class="avatar-circle">M</div>
            <div class="greeting-text">
                <span class="v-label">Executive Vendor 👋</span>
                <span class="v-name">Mochearn Admin</span>
            </div>
        </div>
        <div class="nav-icons">
            <button class="icon-btn">🔔</button>
        </div>
    </header>
    </body>
    </html>
