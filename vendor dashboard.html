<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn | Vendor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --m-blue: #007bff;
            --m-bg: #f8f9fa;
            --m-dark: #111111;
            --m-gray: #6c757d;
            --m-white: #ffffff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--m-bg); 
            margin: 0; 
            padding: 0;
            color: var(--m-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* 🟢 THE FLOATING TOP ROLL */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: var(--m-white);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 1px solid #eeeeee;
        }

        .menu-icon {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--m-dark);
        }

        .nav-title {
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--m-dark);
        }

        /* 🔵 THE GREETING BLOCK (STRETCHED BELOW NAV) */
        .main-wrapper {
            margin-top: 70px; /* Space for the floating nav */
            padding: 25px 20px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .avatar-box {
            width: 55px;
            height: 55px;
            background: #e9ecef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.3rem;
            color: var(--m-blue);
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .welcome-msg {
            display: flex;
            flex-direction: column;
        }

        .label-text {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--m-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-name {
            font-size: 1.2rem;
            font-weight: 900;
            margin-top: 2px;
        }

    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="menu-icon">☰</div>
        <div class="nav-title">Vendor Dashboard</div>
        <div class="notif-bell" style="font-size: 1.2rem;">🔔</div>
    </nav>

    <div class="main-wrapper">
        
        <header class="profile-section">
            <div class="avatar-box">M</div>
            <div class="welcome-msg">
                <span class="label-text">Executive Vendor 👋</span>
                <span class="user-name">Mochearn Admin</span>
            </div>
        </header>

    </div>

</body>
    </html>
