<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0; 
            background-color: #00ff88; /* Matching Catalyst Green */
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: #ffffff;
            width: 85%;
            max-width: 400px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo-header { background: #050a18; padding: 30px 20px; }
        .logo-placeholder { width: 130px; height: 35px; margin: 0 auto; border: 1px dashed #444; color: #555; display: flex; justify-content: center; align-items: center; font-size: 0.6rem; }

        .form-content { padding: 40px 30px; }
        h2 { font-weight: 600; font-size: 1.3rem; margin-bottom: 5px; color: #333; text-transform: uppercase; }
        p.subtitle { color: #00ff88; font-size: 0.7rem; margin-bottom: 25px; font-weight: 600; letter-spacing: 1px; }

        .input-group { text-align: left; margin-bottom: 20px; position: relative; }
        .input-group label { display: block; font-size: 0.75rem; margin-bottom: 6px; color: #666; font-weight: 400; }
        
        input {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 5px;
            color: #333;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            font-size: 0.85rem;
        }

        input:focus { outline: none; border-color: #00ff88; }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 35px;
            cursor: pointer;
            color: #bbb;
            font-size: 0.9rem;
            z-index: 10;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #00ff88;
            color: #050a18;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .footer-link { margin-top: 25px; font-size: 0.8rem; color: #888; }
        .footer-link a { color: #333; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-header"><div class="logo-placeholder">YOUR LOGO HERE</div></div>

        <div class="form-content">
            <h2>Vendor Vault</h2>
            <p class="subtitle">MERCHANT ADMINISTRATION</p>

            <form>
                <div class="input-group">
                    <label>Vendor ID / Email</label>
                    <input type="text" placeholder="Enter your ID" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="pass" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye-slash toggle-password" onclick="togglePass(this)"></i>
                </div>

                <button type="submit" class="login-btn">Unlock Portal</button>
            </form>

            <div class="footer-link">
                Need a vendor license? <a href="#">Contact Admin</a>
            </div>
        </div>
    </div>

    <script>
        function togglePass(icon) {
            const input = document.getElementById('pass');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            }
        }
    </script>
</body>
</html>
