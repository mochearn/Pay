<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn | Financial Settings (NG)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --banker-blue: #007bff;
            --mochearn-green: #28a745;
            --text-dark: #111111;
            --bg-body: #ffffff;
            --strong-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); margin: 0; color: var(--text-dark); }
        .header { padding: 18px 5%; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #f0f0f0; }
        .header h1 { font-size: 1rem; font-weight: 900; margin: 0; text-transform: uppercase; }
        .container { width: 92%; margin: 25px auto; padding-bottom: 80px; }

        .section-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .section-title { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; margin: 0; }

        .finance-card { background: white; border-radius: 16px; padding: 25px; box-shadow: var(--strong-shadow); margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 0.75rem; font-weight: 800; color: #666; text-transform: uppercase; margin-bottom: 8px; display: block; }

        .styled-input, .styled-select {
            width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 10px;
            font-size: 0.9rem; font-weight: 600; box-sizing: border-box; outline: none;
        }

        /* PIN INPUTS */
        .pin-box { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .pin-digit {
            width: 50px; height: 55px; text-align: center; font-size: 1.5rem;
            font-weight: 800; border: 1.5px solid #eee; border-radius: 10px; outline: none;
        }

        .save-btn {
            width: 100%; margin-top: 30px; padding: 18px; background: var(--banker-blue);
            color: white; border: none; border-radius: 12px; font-weight: 900;
            font-size: 0.95rem; text-transform: uppercase; cursor: pointer;
        }

        .toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #111; color: #fff; padding: 12px 25px; border-radius: 30px;
            font-size: 0.8rem; font-weight: 700; z-index: 9999; transition: top 0.4s ease;
        }
        .toast.show { top: 25px; }
    </style>
</head>
<body>

    <div id="save-toast" class="toast">RECORDS UPDATED SECURELY 🛡️</div>

    <div class="header">
        <svg onclick="history.back()" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="cursor:pointer;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <h1>Financial Settings</h1>
    </div>

    <div class="container">
        <div class="section-row">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--banker-blue)" stroke-width="2.5"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
            <h2 class="section-title">Nigerian Payouts</h2>
        </div>

        <div class="finance-card">
            <div class="input-group">
                <label class="input-label">Region</label>
                <div class="styled-input" style="background: #f9f9f9; color: #999; display: flex; align-items: center; gap: 8px;">
                    🇳🇬 Nigeria (Fixed)
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Choose Payout Method</label>
                <select id="payoutMethod" class="styled-select" onchange="renderNGFields()">
                    <option value="">-- Select Method --</option>
                    <option value="bank">Traditional Local Bank</option>
                    <option value="fintech">Opay / Palmpay Wallet</option>
                    <option value="crypto">USDT (Crypto - TRC20)</option>
                </select>
            </div>

            <div id="dynamicFields"></div>
        </div>

        <div class="section-row" style="margin-top: 40px;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--mochearn-green)" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <h2 class="section-title">Vault Access Pin</h2>
        </div>

        <div class="finance-card">
            <label class="input-label" style="text-align: center;">Enter 4-Digit Pin to Authorize</label>
            <div class="pin-box">
                <input type="password" maxlength="1" class="pin-digit" oninput="moveFocus(this, 0)">
                <input type="password" maxlength="1" class="pin-digit" oninput="moveFocus(this, 1)">
                <input type="password" maxlength="1" class="pin-digit" oninput="moveFocus(this, 2)">
                <input type="password" maxlength="1" class="pin-digit" oninput="moveFocus(this, 3)">
            </div>
            
            <button class="save-btn" onclick="saveFinancials()">Update Financial Records</button>
        </div>
    </div>

    <script>
        function renderNGFields() {
            const method = document.getElementById('payoutMethod').value;
            const container = document.getElementById('dynamicFields');
            container.innerHTML = '';

            if (method === "bank") {
                container.innerHTML = `
                    <div class="input-group"><label class="input-label">Bank Name</label><input type="text" class="styled-input" placeholder="e.g. GTBank, Zenith, Kuda"></div>
                    <div class="input-group"><label class="input-label">Account Number</label><input type="number" class="styled-input" placeholder="10 Digits"></div>
                    <div class="input-group"><label class="input-label">Account Holder Name</label><input type="text" class="styled-input" placeholder="Full Name"></div>
                `;
            } else if (method === "fintech") {
                container.innerHTML = `
                    <div class="input-group"><label class="input-label">Wallet Provider</label><select class="styled-select"><option>Opay</option><option>Palmpay</option></select></div>
                    <div class="input-group"><label class="input-label">Phone Number (Wallet ID)</label><input type="number" class="styled-input" placeholder="080 / 070 / 090..."></div>
                    <div class="input-group"><label class="input-label">Verified Name</label><input type="text" class="styled-input" placeholder="Account Name"></div>
                `;
            } else if (method === "crypto") {
                container.innerHTML = `
                    <div class="input-group"><label class="input-label">USDT Wallet Address (TRC20)</label><input type="text" class="styled-input" placeholder="Paste TRC20 Address"></div>
                `;
            }
        }

        // FLUID PIN JUMPING 🏎️
        const pins = document.querySelectorAll('.pin-digit');
        function moveFocus(el, index) {
            if (el.value.length === 1 && index < 3) {
                pins[index + 1].focus();
            }
        }

        function saveFinancials() {
            const toast = document.getElementById('save-toast');
            toast.classList.add('show');
            
            // WIPE PIN 🧹
            pins.forEach(p => p.value = '');
            pins[0].focus();

            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }
    </script>
</body>
            </html>
