<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Mochearn Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #050a18; 
            color: #ffffff; 
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 800px; /* Centered 60% width for Laptop */
            margin: 0 auto;
            padding: 40px 20px;
        }

        .hub-title {
            font-family: 'Montserrat', sans-serif;
            color: #00ff88;
            text-align: center;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* PRODUCT ROW DESIGN */
        .product-row {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            align-items: flex-start;
            transition: background 0.3s ease;
        }

        /* LEFT STACK: IMAGES */
        .image-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 100px;
        }

        .product-img {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #00ff88;
        }

        .vendor-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            align-self: center;
        }

        /* CENTER BLOCK: TEXT */
        .info-block {
            flex-grow: 1;
        }

        .p-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .v-name {
            display: block;
            font-size: 0.8rem;
            color: #00ff88;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* DESCRIPTION BOX */
        .desc-container {
            position: relative;
            overflow: hidden;
        }

        .desc-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cccccc;
            /* Start with 3-line clamp */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .desc-text.expanded {
            display: block;
            -webkit-line-clamp: unset;
            max-height: 2000px; /* Allows full growth */
        }

        .toggle-btn {
            color: #00ff88;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            background: none;
            border: none;
            margin-top: 8px;
            display: inline-block;
        }

        /* RIGHT BLOCK: PRICE & ACTION */
        .action-block {
            text-align: right;
            min-width: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .price-area {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .lock-icon { font-size: 1.4rem; color: #555; }

        .cmd-btn {
            background: #00ff88;
            color: #050a18;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .cmd-btn:hover { transform: scale(1.05); }

        /* BLACKOUT EMPTY STATE */
        #empty-notice {
            display: block; /* Shown by default since no products exist */
            text-align: center;
            padding: 100px 20px;
        }

        #empty-notice p { color: #666; font-size: 1.1rem; letter-spacing: 1px; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 600px) {
            .product-row { flex-direction: column; align-items: center; text-align: center; }
            .action-block { text-align: center; min-width: 100%; margin-top: 20px; }
            .image-stack { align-items: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="hub-title">The Vault 💎</h1>
        
        <div id="product-list"></div>

        <div id="empty-notice">
            <p>No available products yet.</p>
        </div>
    </div>

    <script>
        // THIS LIST IS EMPTY. 
        // When you are ready to add products, they go inside these brackets [ ].
        const products = []; 

        const list = document.getElementById('product-list');
        const emptyNotice = document.getElementById('empty-notice');

        // SCANNING LOGIC
        if (products.length > 0) {
            emptyNotice.style.display = 'none';
            products.forEach((p, index) => {
                const priceHTML = p.showPrice ? p.price : '<span class="lock-icon">🔒</span>';
                
                list.innerHTML += `
                    <div class="product-row">
                        <div class="image-stack">
                            <img src="${p.pImg}" class="product-img">
                            <img src="${p.vImg}" class="vendor-img">
                        </div>
                        <div class="info-block">
                            <h2 class="p-name">${p.name}</h2>
                            <span class="v-name">Vendor: ${p.vendor}</span>
                            <div class="desc-container">
                                <p class="desc-text" id="desc-${index}">${p.desc}</p>
                                <button class="toggle-btn" id="btn-${index}" onclick="handleToggle(${index})">... see more</button>
                            </div>
                        </div>
                        <div class="action-block">
                            <div class="price-area">${priceHTML}</div>
                            <a href="#" class="cmd-btn">COMMAND 💎</a>
                        </div>
                    </div>
                `;
            });
        }

        // TOGGLE LOGIC: SEE MORE / SEE LESS
        function handleToggle(id) {
            const textElement = document.getElementById(`desc-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            
            if (textElement.classList.contains('expanded')) {
                // CLOSE IT
                textElement.classList.remove('expanded');
                btn.innerText = "... see more";
            } else {
                // OPEN IT (LINE BY LINE FEEL)
                textElement.classList.add('expanded');
                btn.innerText = "see less ↑";
            }
        }
    </script>
</body>
    </html>
