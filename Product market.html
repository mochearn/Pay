<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Mochearn Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* BLACKOUT EMPTY STATE SUPPORT */
        body { 
            background-color: #050a18; 
            color: #ffffff; 
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 800px; /* 60% feel on Laptop */
            margin: 0 auto;
            padding: 40px 20px;
        }

        .hub-title {
            font-family: 'Montserrat', sans-serif;
            color: #00ff88;
            text-align: center;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* PRODUCT ROW DESIGN */
        .product-row {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            align-items: flex-start;
        }

        /* LEFT STACK: IMAGES */
        .image-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 100px;
        }

        .product-img {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #00ff88;
        }

        .vendor-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            align-self: center;
        }

        /* CENTER BLOCK: TEXT */
        .info-block {
            flex-grow: 1;
        }

        .p-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .v-name {
            display: block;
            font-size: 0.8rem;
            color: #00ff88;
            margin-bottom: 15px;
        }

        /* 3-LINE DESCRIPTION RULE */
        .desc-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #cccccc;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            transition: all 0.5s ease;
        }

        .desc-text.expanded {
            display: block; /* Removes the 3-line limit */
            -webkit-line-clamp: unset;
        }

        .see-more {
            color: #00ff88;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            background: none;
            border: none;
            margin-top: 5px;
        }

        /* RIGHT BLOCK: PRICE & ACTION */
        .action-block {
            text-align: right;
            min-width: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .price-area {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        .lock-icon { font-size: 1.5rem; opacity: 0.5; }

        .cmd-btn {
            background: #00ff88;
            color: #050a18;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        /* EMPTY STATE */
        #empty-notice {
            display: none;
            text-align: center;
            padding-top: 100px;
        }

        #empty-notice p { color: #888; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <h1 class="hub-title">The Vault 💎</h1>
        <div id="product-list"></div>
        <div id="empty-notice">
            <p>No available products yet.</p>
        </div>
    </div>

    <script>
        // DATABASE SCANNING SIMULATION
        const products = [
            {
                name: "The J-System",
                vendor: "Jonard Global",
                desc: "Unlock the elite tools for financial transformation. This blueprint is designed to build a digital fortress that stands firm against inflation. Master high-income skills with modules validated by experts and scale your revenue today.",
                price: "₦5,000",
                showPrice: true,
                pImg: "https://images.unsplash.com/photo-1553729459-efe14ef6055d?w=200",
                vImg: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100"
            },
            {
                name: "Vendor Secret",
                vendor: "Mochearn Elite",
                desc: "A classified guide to multi-vendor management. This restricted module is for those looking to dominate the marketplace. Learn the hidden protocols of high-level digital asset sales and secure your future.",
                price: "₦15,000",
                showPrice: false, // LOCK ICON TRIGGER
                pImg: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=200",
                vImg: "https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=100"
            }
        ];

        const list = document.getElementById('product-list');
        const emptyNotice = document.getElementById('empty-notice');

        // SCANNING LOGIC
        if (products.length === 0) {
            emptyNotice.style.display = 'block';
        } else {
            products.forEach((p, index) => {
                const priceHTML = p.showPrice ? p.price : '<span class="lock-icon">🔒</span>';
                
                list.innerHTML += `
                    <div class="product-row">
                        <div class="image-stack">
                            <img src="${p.pImg}" class="product-img">
                            <img src="${p.vImg}" class="vendor-img">
                        </div>
                        <div class="info-block">
                            <h2 class="p-name">${p.name}</h2>
                            <span class="v-name">Vendor: ${p.vendor}</span>
                            <p class="desc-text" id="desc-${index}">${p.desc}</p>
                            <button class="see-more" onclick="revealText(${index})">... see more</button>
                        </div>
                        <div class="action-block">
                            <div class="price-area">${priceHTML}</div>
                            <a href="#" class="cmd-btn">COMMAND 💎</a>
                        </div>
                    </div>
                `;
            });
        }

        // LINE-BY-LINE REVEAL MAGIC
        function revealText(id) {
            const textElement = document.getElementById(`desc-${id}`);
            textElement.classList.add('expanded');
            textElement.style.maxHeight = '0px';
            
            // Fast count-down reveal effect
            let height = 0;
            const target = 300; // estimated max height
            const interval = setInterval(() => {
                height += 15;
                textElement.style.maxHeight = height + 'px';
                if (height >= target) clearInterval(interval);
            }, 20); // Fast timing
            
            event.target.style.display = 'none'; // Hide "see more" after click
        }
    </script>
</body>
    </html>
