<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 1. THE SPLIT BACKGROUND (From your Sketch) */
        body {
            margin: 0;
            padding: 0;
            /* Top part is Dark Deep Navy, Bottom is Pure Black */
            background: linear-gradient(to bottom, #050a18 0%, #050a18 35%, #000000 35%, #000000 100%);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        /* 2. THE WHITE LOGIN BAR (Small & Curved edges as requested) */
        .login-container {
            background: #ffffff; /* Changed to White per your sketch */
            padding: 40px 30px;
            border-radius: 30px; /* More curved edges per sketch */
            width: 100%;
            max-width: 340px; /* Made a bit smaller per your request */
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* LOGO SPACE (Inside the white bar) */
        .logo-placeholder {
            width: 150px;
            height: 50px;
            margin: 0 auto 20px auto;
            border: 1px dashed #ccc; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: #777;
            font-size: 0.7rem;
        }

        /* TEXT COLORS (Adjusted to show on White background) */
        h2 { font-weight: 900; font-size: 1.5rem; margin-bottom: 10px; text-transform: uppercase; color: #050a18; }
        p.subtitle { color: #00ff88; font-size: 0.8rem; margin-bottom: 30px; font-weight: 600; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; margin-bottom: 8px; color: #666; font-weight: 700; }
        
        /* RESTORED ORIGINAL INPUT STYLES */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            background: #0a1126; /* Back to original dark inputs */
            border: 1px solid #1a2a4d;
            border-radius: 8px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: #00ff88; }

        .extra-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            margin-bottom: 25px;
            color: #666;
        }

        .remember-me { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .forgot-pass { color: #00ff88; text-decoration: none; font-weight: 700; }

        /* RESTORED ORIGINAL NEON BUTTON */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            color: #050a18;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .login-btn:hover { background: #00cc6e; transform: translateY(-2px); }

        .signup-bridge { margin-top: 30px; font-size: 0.75rem; color: #666; }
        .signup-bridge a { color: #050a18; text-decoration: underline; font-weight: 700; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-placeholder">YOUR LOGO HERE</div>

        <h2>Welcome Back</h2>
        <p class="subtitle">ENTER THE VAULT</p>

        <form>
            <div class="input-group">
                <label>EMAIL OR USERNAME</label>
                <input type="text" placeholder="Enter your credentials..." required>
            </div>

            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div class="extra-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Login to Mochearn</button>
        </form>

        <div class="signup-bridge">
            Not a Catalyst yet? <a href="signup.html">Join the Movement</a>
        </div>
    </div>

</body>
    </html>
