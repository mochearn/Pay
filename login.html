<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050a18; /* Mochearn Deep Navy Background */
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* THE MAIN WHITE BAR (Curved & Compact) */
        .login-card {
            background: #ffffff;
            width: 90%;
            max-width: 360px;
            border-radius: 25px;
            overflow: hidden; /* Ensures the dark logo part stays inside the curves */
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* DARK LOGO AREA AT THE TOP */
        .logo-header {
            background: #050a18; /* Dark color for logo as requested */
            padding: 30px 20px;
            text-align: center;
        }

        .logo-placeholder {
            width: 140px;
            height: 45px;
            margin: 0 auto;
            border: 1px dashed #444;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            font-size: 0.7rem;
        }

        /* FORM CONTENT AREA */
        .form-content {
            padding: 30px 25px;
            text-align: center;
        }

        h2 { font-weight: 900; font-size: 1.5rem; margin-bottom: 5px; color: #050a18; text-transform: uppercase; }
        p.subtitle { color: #00ff88; font-size: 0.8rem; margin-bottom: 25px; font-weight: 700; letter-spacing: 1px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; margin-bottom: 6px; color: #333; font-weight: 700; }
        
        /* WHITE FORM BOXES (Professional Style) */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            background: #ffffff; /* White background to match the bar */
            border: 2px solid #eeeeee; /* Light border */
            border-radius: 10px;
            color: #333;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            font-weight: 600;
        }

        input:focus { outline: none; border-color: #00ff88; }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            margin-bottom: 25px;
            color: #666;
        }

        .remember { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .forgot { color: #00ff88; text-decoration: none; font-weight: 800; }

        /* THE NEON GREEN BUTTON */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            color: #050a18;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .login-btn:hover { background: #00cc6e; transform: translateY(-2px); }

        .footer-link { margin-top: 25px; font-size: 0.75rem; color: #666; }
        .footer-link a { color: #050a18; text-decoration: underline; font-weight: 800; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-header">
            <div class="logo-placeholder">YOUR LOGO HERE</div>
        </div>

        <div class="form-content">
            <h2>Welcome Back</h2>
            <p class="subtitle">ENTER THE VAULT</p>

            <form>
                <div class="input-group">
                    <label>EMAIL OR USERNAME</label>
                    <input type="text" placeholder="Enter your credentials..." required>
                </div>

                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="options-row">
                    <label class="remember">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login to Mochearn</button>
            </form>

            <div class="footer-link">
                Not a Catalyst yet? <a href="signup.html">Join the Movement</a>
            </div>
        </div>
    </div>

</body>
    </html>
