<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyst Login | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 40px 0; 
            background-color: #00ff88; /* Mochearn/ValPulse Green */
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .login-card {
            background: #ffffff;
            width: 85%;
            max-width: 380px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin: auto;
        }

        .logo-header {
            background: #050a18; 
            padding: 40px 20px;
            text-align: center;
        }

        .logo-placeholder {
            width: 140px;
            height: 40px;
            margin: 0 auto;
            border: 1px dashed #444;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            font-size: 0.7rem;
        }

        .form-content {
            padding: 40px 30px;
            text-align: center;
        }

        h2 { 
            font-weight: 600; 
            font-size: 1.4rem; 
            margin-bottom: 5px; 
            color: #333; 
        }

        /* UPDATED TO CATALYST LOGIN */
        p.subtitle { 
            color: #00ff88; 
            font-size: 0.75rem; 
            margin-bottom: 30px; 
            font-weight: 600; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group { text-align: left; margin-bottom: 20px; }
        
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            margin-bottom: 8px; 
            color: #666; 
            font-weight: 400; 
        }
        
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 5px;
            color: #333;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            font-size: 0.9rem;
            font-weight: 300;
        }

        input:focus { outline: none; border-color: #00ff88; }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            margin-bottom: 30px;
            color: #888;
        }

        .remember { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .forgot { color: #00ff88; text-decoration: none; font-weight: 600; }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #00ff88;
            color: #050a18;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .login-btn:hover { opacity: 0.9; }

        .footer-link { margin-top: 25px; font-size: 0.8rem; color: #888; }
        .footer-link a { color: #333; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-header">
            <div class="logo-placeholder">YOUR LOGO HERE</div>
        </div>

        <div class="form-content">
            <h2>Welcome Back</h2>
            <p class="subtitle">CATALYST LOGIN</p>

            <form>
                <div class="input-group">
                    <label>Email or Username</label>
                    <input type="text" placeholder="Enter your credentials..." required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="options-row">
                    <label class="remember">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="Recovery account.html" class="forgot">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login to Mochearn</button>
            </form>

            <div class="footer-link">
                Not a Catalyst yet? <a href="Access.html">Join the Movement</a>
            </div>
        </div>
    </div>

</body>
    </html>
