<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Hub | Mochearn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #f4f7f6; font-family: 'Montserrat', sans-serif; color: #050a18; }
        .m-header { background: #050a18; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 999; }
        .m-header h1 { color: #ffffff; font-size: 1.2rem; margin: 0; font-weight: 800; letter-spacing: 1px; }
        .back-home { color: #00ff88; text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .card { background: #ffffff; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; position: relative; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; font-family: 'Montserrat'; box-sizing: border-box; }
        
        /* BUTTON STATES */
        .btn-submit { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; background: #00ff88; color: #050a18; }
        .btn-black { background: #000000 !important; color: #ffffff !important; }

        /* WARNING BOX */
        #tapWarning { display: none; font-size: 0.75rem; font-weight: 700; color: #ff4d4d; margin-bottom: 15px; background: rgba(255, 77, 77, 0.05); padding: 10px; border-radius: 8px; border-left: 4px solid #ff4d4d; }

        /* SUCCESS PILL (Small & Opacity 1) */
        #successBox { display: none; position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0, 255, 136, 0.4); color: black; padding: 8px 18px; border-radius: 50px; font-weight: 800; font-size: 0.75rem; z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); white-space: nowrap; opacity: 1; }

        /* LEADERBOARD & REAL PHOTOS */
        .leader-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #eee; }
        .pfp-wrap { position: relative; width: 45px; height: 45px; }
       .pfp { 
    width: 100%; 
    height: 100%; 
    border-radius: 50%; /* Makes the image round */
    object-fit: cover;   /* Forces it to fill the circle without stretching */
    border: 2px solid #00ff88; /* RESTORES your green circle border */
    display: block;
        }
        .diamond-badge { position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; background: white; -webkit-clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%); clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%); display: flex; justify-content: center; align-items: center; color: #050a18; font-weight: 900; font-size: 0.5rem; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="successBox">Report submitted successfully, <span id="userName"></span>!</div>

    <header class="m-header">
        <h1>MOCHEARN</h1>
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back Home</a>
    </header>

    <div class="container">
        <div style="text-align: center; padding: 30px 0;">
            <h2 style="font-weight: 800; text-transform: uppercase; letter-spacing: 2px;">Help & Hub</h2>
            <p style="opacity: 0.6; font-size: 0.9rem;">Mochearn Official Resolution Center</p>
        </div>

        <div style="display: flex; flex-wrap: wrap; gap: 20px;">
            <div style="flex: 1.2; min-width: 320px;">
                <div class="card">
                    <h3 style="margin-top: 0;">Open Support Ticket</h3>
                    <form id="mochearnForm">
                        <input type="text" id="mUsername" placeholder="Mochearn Username" required onfocus="document.getElementById('tapWarning').style.display='block'" onblur="document.getElementById('tapWarning').style.display='none'">
                        <div id="tapWarning">WARNING: Use your official Mochearn account name. Lift <span style="color: #008844;">DIRECTLY</span>.</div>
                        <input type="email" placeholder="Email Address" required>
                        <select id="mCategory">
                            <option value="">Category (Optional)</option>
                            <option>1. Withdrawal</option>
                            <option>2. Security</option>
                            <option>3. Registration</option>
                            <option>4. Vendor</option>
                            <option>5. Technical</option>
                            <option>6. Sales</option>
                            <option>7. Rewards</option>
                            <option>8. Profile</option>
                            <option>9. Fraud</option>
                            <option>10. General</option>
                        </select>
                        <textarea placeholder="Describe your issue..." rows="5" required></textarea>
                        <button type="submit" id="submitBtn" class="btn-submit">Submit Ticket</button>
                    </form>
                </div>
            </div>

            <div style="flex: 0.8; min-width: 320px;">
                <div class="card">
                    <h4 style="margin-top: 0; text-transform: uppercase; font-size: 0.7rem; color: #666;">Top Catalyst This Week 🏆</h4>
                    
                    <div class="leader-item">
                        <div class="pfp-wrap">
                            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop" class="pfp">
                            <div class="diamond-badge">CR</div>
                        </div>
                        <span style="flex:1; font-weight: 600;">@Catalyst_King</span>
                        <span style="color:#00ff88; font-weight: 800;">₦510k</span>
                    </div>

                    <div class="leader-item">
                        <div class="pfp-wrap">
                            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&h=100&fit=crop" class="pfp">
                            <div class="diamond-badge">CR</div>
                        </div>
                        <span style="flex:1; font-weight: 600;">@Jonard_Bethuel</span>
                        <span style="color:#00ff88; font-weight: 800;">₦320k</span>
                    </div>

                    <div class="leader-item" style="border:none;">
                        <div class="pfp-wrap">
                            <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=100&h=100&fit=crop" class="pfp">
                            <div class="diamond-badge">CR</div>
                        </div>
                        <span style="flex:1; font-weight: 600;">@Alpha_Vendor</span>
                        <span style="color:#00ff88; font-weight: 800;">₦245k</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('mochearnForm');
        const submitBtn = document.getElementById('submitBtn');
        const successBox = document.getElementById('successBox');

        form.onsubmit = function(e) {
            e.preventDefault();
            document.getElementById('userName').innerText = document.getElementById('mUsername').value;
            
            // SHOW SUCCESS
            successBox.style.display = 'block';
            submitBtn.classList.add('btn-black');
            submitBtn.innerText = 'TICKET SUBMITTED';
            
            setTimeout(() => { successBox.style.display = 'none'; }, 4000);
            form.reset();
        };

        // Detect typing to reset button state
        form.oninput = function() {
            submitBtn.classList.remove('btn-black');
            submitBtn.innerText = 'SUBMIT TICKET';
        };
    </script>
</body>
    </html>
