<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn Studio | Create Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #0e6954; --bg: #fcfcfc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); padding-bottom: 50px; }

        /* THE EMERALD HEADER */
        .studio-header { 
            background: var(--emerald); 
            color: white; 
            padding: 50px 20px; 
            text-align: center;
            /* Space given between header and card */
            margin-bottom: 40px; 
        }
        .studio-header h1 { font-size: 1.8rem; font-weight: 900; }
        .studio-header p { opacity: 0.8; font-size: 0.85rem; margin-top: 8px; }

        /* THE SQUARE FORM CONTAINER */
        .wizard-container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: #fff; 
            border-radius: 0px; /* Removed the curve as requested */
            padding: 50px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); 
        }

        /* SPACED STEP INDICATORS */
        .step-nav { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 50px; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 20px;
            gap: 20px; /* Prevents them from kissing */
        }
        .step { 
            font-size: 0.75rem; 
            font-weight: 800; 
            color: #ccc; 
            text-transform: uppercase; 
            flex: 1; 
            text-align: center;
        }
        .step.active { color: var(--emerald); border-bottom: 2px solid var(--emerald); padding-bottom: 18px; margin-bottom: -21px; }

        /* FORM GROUPS */
        .form-group { margin-bottom: 30px; }
        label { display: block; font-weight: 800; font-size: 0.85rem; margin-bottom: 12px; color: #333; }
        input, select { 
            width: 100%; 
            padding: 18px; 
            border: 2px solid #f0f0f0; 
            border-radius: 8px; /* Slight edge for inputs, but card is square */
            outline: none; 
            font-size: 1rem; 
            background: #fff;
        }
        input:focus { border-color: var(--emerald); }

        .btn-next { 
            background: var(--emerald); 
            color: #fff; 
            border: none; 
            padding: 18px 45px; 
            border-radius: 5px; 
            font-weight: 800; 
            cursor: pointer; 
            float: right;
            font-size: 0.9rem;
        }
        .btn-next:hover { background: #0a5241; }
    </style>
</head>
<body>

<header class="studio-header">
    <h1>Mochearn Studio 🏗️</h1>
    <p>The system is built for scale. Let's create your next empire.</p>
</header>

<div class="wizard-container">
    
    <div class="step-nav">
        <span class="step active">1. Identity</span>
        <span class="step">2. Sales Gateway</span>
        <span class="step">3. Academy Builder</span>
        <span class="step">4. Review</span>
    </div>

    <div id="part1">
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" placeholder="e.g. Digital Marketing Masterclass">
        </div>

        <div class="form-group">
            <label>Category</label>
            <select>
                <option>Affiliate Marketing</option>
                <option>E-commerce</option>
                <option>Graphic Design</option>
                <option>Web Development</option>
                <option>Personal Finance</option>
            </select>
        </div>

        <div class="form-group">
            <label>Selling Price (₦)</label>
            <input type="number" placeholder="15000">
        </div>

        <div class="form-group">
            <label>Catalyst Commission (%)</label>
            <input type="number" placeholder="50">
        </div>

        <button class="btn-next">Next Step</button>
        <div style="clear: both;"></div>
    </div>

</div>

</body>
                                            </html>
