<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn Studio | Step 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #0e6954; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); padding: 20px; }

        /* THE CONTAINER */
        .studio-box { 
            max-width: 700px; 
            margin: 40px auto; 
            background: #fff; 
            border-radius: 20px; 
            padding: 40px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }

        .studio-header { margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .studio-header h2 { color: var(--emerald); font-weight: 900; }
        .step-tag { font-size: 0.7rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        /* FORM ELEMENTS */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; color: #333; }
        input, select { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            outline: none; 
            font-size: 1rem; 
            transition: 0.3s; 
        }
        input:focus { border-color: var(--emerald); }

        .btn-next { 
            background: var(--emerald); 
            color: #fff; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            float: right;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="studio-box">
    <div class="studio-header">
        <span class="step-tag">Step 1 of 4</span>
        <h2>Product Identity 🏷️</h2>
    </div>

    <div id="part1">
        <div class="form-group">
            <label>What is the Name of your Product?</label>
            <input type="text" placeholder="e.g. The J-System 2.0">
        </div>

        <div class="form-group">
            <label>Category</label>
            <select>
                <option>Affiliate Marketing</option>
                <option>Digital Skills</option>
                <option>E-commerce</option>
            </select>
        </div>

        <div class="form-group">
            <label>Price (₦)</label>
            <input type="number" placeholder="20000">
        </div>

        <div class="form-group">
            <label>Catalyst Commission (%)</label>
            <input type="number" placeholder="50">
        </div>

        <button class="btn-next">Continue to Gateway ⮕</button>
    </div>
</div>

</body>
  </html>
