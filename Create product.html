<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #0e6954; --bg: #fcfcfc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* Desktop Mode Framework */
        body { background: #f0f0f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-container { 
            background: var(--bg); 
            width: 100%; 
            max-width: 420px; 
            min-height: 100vh; 
            box-shadow: 0 0 50px rgba(0,0,0,0.1); 
            position: relative;
        }

        @media (min-width: 768px) {
            .main-container { min-height: 800px; margin: 20px; border-radius: 20px; overflow: hidden; }
        }

        /* Header Section */
        .studio-header { background: var(--emerald); color: white; padding: 60px 20px; text-align: center; }
        .studio-header h1 { font-size: 2rem; font-weight: 900; margin-bottom: 10px; }
        .studio-header p { opacity: 0.8; font-size: 0.9rem; }

        /* Wizard Progress */
        .step-nav { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid #eee; padding: 20px 0; }
        .step { font-size: 0.65rem; font-weight: 800; color: #ccc; text-transform: uppercase; text-align: center; }
        .step.active { color: var(--emerald); border-bottom: 2px solid var(--emerald); padding-bottom: 10px; }

        /* Form Content - Centered & Sleek */
        .wizard-container { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .setup-stage { display: none; width: 100%; opacity: 0; transition: 0.4s; text-align: center; }
        .setup-stage.active-slide { display: block; opacity: 1; }

        .form-group { margin-bottom: 25px; width: 100%; max-width: 320px; }
        label { display: block; font-weight: 800; font-size: 0.85rem; color: #333; margin-bottom: 5px; }
        .hint { font-size: 0.7rem; color: #999; margin-bottom: 10px; display: block; }
        
        input, select { width: 100%; padding: 16px; border: 2px solid #f2f2f2; border-radius: 8px; font-size: 0.95rem; background: #fafafa; text-align: center; outline: none; }
        input:focus { border-color: var(--emerald); background: #fff; }

        /* Buttons - Simple & Spaced */
        .btn-nav { 
            width: 100%; 
            max-width: 320px;
            background: var(--emerald); 
            color: #fff; 
            height: 55px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin-top: 40px; 
        }
        .btn-back { background: none; color: #999; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 15px; font-size: 0.75rem; }

        /* Sleek Notification Pill */
        #mochearnNotify { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 350px; background: #111; color: white; 
            padding: 10px 20px; border-radius: 50px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 10000; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
        }
        #mochearnNotify.show { top: 20px; }
        #skipBtn { color: var(--emerald); font-weight: 900; font-size: 0.7rem; cursor: pointer; border-left: 1px solid #333; padding-left: 12px; }
    </style>
</head>
<body>

<div id="mochearnNotify">
    <p id="notifyText" style="font-size: 0.75rem; font-weight: 600;">Required field missing 🛡️</p>
    <span id="skipBtn">SKIP →</span>
</div>

<div class="main-container">
    <header class="studio-header">
        <h1>Mochearn Studio 🏗️</h1>
        <p>The system is built for scale. Let's create your next empire.</p>
    </header>

    <div class="step-nav">
        <span class="step active" id="s1">1. Identity</span>
        <span class="step" id="s2">2. Gateway</span>
        <span class="step" id="s3">3. Academy</span>
        <span class="step" id="s4">4. Review</span>
    </div>

    <div class="wizard-container">
        <div id="part1" class="setup-stage active-slide" style="display: block;">
            <div class="form-group">
                <label>Product Name</label>
                <span class="hint">Make it magnetic for Catalysts to push</span>
                <input type="text" id="pName" placeholder="e.g. Wealth Vault Masterclass">
            </div>
            <div class="form-group">
                <label>Category</label>
                <span class="hint">Choose the correct sector</span>
                <select id="pCat">
                    <option value="">Select Category</option>
                    <option>Affiliate Marketing</option>
                    <option>E-commerce</option>
                </select>
            </div>
            <button type="button" class="btn-nav" onclick="goTo(2)">Next</button>
        </div>

        <div id="part2" class="setup-stage">
            <h2 style="margin-top: 30px; color: var(--emerald);">Gateway Stage</h2>
            <button type="button" class="btn-nav" onclick="goTo(3)">Next</button>
            <button type="button" class="btn-back" onclick="goTo(1)">Back</button>
        </div>
    </div>
</div>

<script>
    let notifyTimer;

    function goTo(step) {
        if (step === 2) {
            const name = document.getElementById('pName').value.trim();
            if (!name) { showNotification("Product name is required", 2); return; }
        }

        document.querySelectorAll('.setup-stage').forEach(part => {
            part.style.display = 'none';
            part.classList.remove('active-slide');
            part.style.opacity = "0";
        });

        const target = document.getElementById('part' + step);
        if (target) {
            target.style.display = 'block';
            setTimeout(() => {
                target.classList.add('active-slide');
                target.style.opacity = "1";
            }, 50);
            updateHeader(step);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function showNotification(message, nextStep) {
        const bar = document.getElementById('mochearnNotify');
        document.getElementById('notifyText').innerText = message;
        bar.classList.add('show');
        
        document.getElementById('skipBtn').onclick = function() {
            bar.classList.remove('show');
            goTo(nextStep);
        };

        if (notifyTimer) clearTimeout(notifyTimer);
        notifyTimer = setTimeout(() => { bar.classList.remove('show'); }, 5000);
    }

    function updateHeader(step) {
        const steps = document.querySelectorAll('.step');
        steps.forEach((s, i) => {
            if ((i + 1) === step) s.classList.add('active');
            else s.classList.remove('active');
        });
    }
</script>

</body>
    </html>
