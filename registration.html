<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 40px 0; 
            background-color: #00ff88; 
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .reg-card {
            background: #ffffff;
            width: 85%;
            max-width: 420px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin: auto;
        }

        .logo-header { background: #050a18; padding: 30px 20px; text-align: center; }
        .logo-placeholder { width: 130px; height: 35px; margin: 0 auto; border: 1px dashed #444; color: #555; display: flex; justify-content: center; align-items: center; font-size: 0.6rem; }

        .form-content { padding: 30px 25px; text-align: center; }
        h2 { font-weight: 600; font-size: 1.3rem; margin-bottom: 5px; color: #333; text-transform: uppercase; }
        p.subtitle { color: #00ff88; font-size: 0.7rem; margin-bottom: 25px; font-weight: 600; letter-spacing: 1px; }

        .input-group { text-align: left; margin-bottom: 15px; position: relative; }
        .input-group label { display: block; font-size: 0.75rem; margin-bottom: 6px; color: #666; font-weight: 400; }
        
        input {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 5px;
            color: #333;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            font-size: 0.85rem;
        }

        /* FLAG PICKER STYLING */
        .iti { width: 100%; }
        .iti__selected-flag { background: #f9f9f9; border-right: 1px solid #ddd; }

        /* PROFESSIONAL EYE ICON */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 35px;
            cursor: pointer;
            color: #bbb;
            font-size: 0.9rem;
            z-index: 10;
        }

        .warning-txt { font-size: 0.65rem; color: #ff3e3e; margin-top: 4px; display: none; font-weight: 600; }

        .terms-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.68rem;
            margin: 20px 0;
            color: #888;
            text-align: left;
            cursor: pointer;
        }

        .reg-btn {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            color: #050a18;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .footer-link { margin-top: 20px; font-size: 0.75rem; color: #888; }
        .footer-link a { color: #333; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="logo-header"><div class="logo-placeholder">YOUR LOGO HERE</div></div>

        <div class="form-content">
            <h2>Start Your Journey</h2>
            <p class="subtitle">CATALYST REGISTRATION</p>

            <form id="regForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your name" onfocus="showWarn('w1')" onblur="hideWarn('w1')" required>
                    <div id="w1" class="warning-txt">⚠️ This name will appear on your Mochearn dashboard.</div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Use your payment email" onfocus="showWarn('w2')" onblur="hideWarn('w2')" required>
                    <div id="w2" class="warning-txt">⚠️ Ensure this matches the email used for payment!</div>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input id="phone" type="tel" onfocus="showWarn('w3')" onblur="hideWarn('w3')" required>
                    <div id="w3" class="warning-txt">⚠️ Your phone is trusted with Mochearn.</div>
                </div>
<style>
    .m-input-group { margin-top: 20px; font-family: 'Inter', sans-serif; }
    .m-label { font-size: 14px; color: #666; display: block; margin-bottom: 8px; font-weight: 500; }
    
    #m-username {
        width: 100%; 
        padding: 15px; 
        border: 1px solid #ddd; 
        border-radius: 10px; 
        font-size: 16px;
        color: #333;
        outline: none;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    #user-gatekeeper-msg {
        font-size: 12px; 
        margin-top: 8px; 
        font-weight: 700; 
        display: none;
        transition: all 0.2s ease;
    }

    /* Visual look for locked inputs */
    input:disabled {
        background-color: #fcfcfc;
        border-color: #eee !important;
        opacity: 0.6;
        cursor: not-allowed;
    }
</style>

<div class="m-input-group">
    <label class="m-label">Choose Username</label>
    <input type="text" id="m-username" name="username" placeholder="e.g. Chidera24" autocomplete="off">
    
    <div id="user-gatekeeper-msg"></div>
</div>
                <div class="input-group">
                    <label>Referral ID (Optional)</label>
                    <input type="text" placeholder="Enter ID if you have one">
                </div>

                <div class="input-group">
                    <label>Create Password</label>
                    <input type="password" id="pass" placeholder="••••••••" onfocus="showWarn('w4')" onblur="hideWarn('w4')" required>
                    <i class="fa-regular fa-eye-slash toggle-password" onclick="togglePass('pass', this)"></i>
                    <div id="w4" class="warning-txt">⚠️ Keep your vault key secret and strong!</div>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm_pass" placeholder="••••••••" required>
                    <i class="fa-regular fa-eye-slash toggle-password" onclick="togglePass('confirm_pass', this)"></i>
                </div>

                <label class="terms-row">
                    <input type="checkbox" id="termsCheck"> I agree to the Catalyst Terms & Conditions
                </label>

                <button type="submit" class="reg-btn">Complete Registration</button>
            </form>

            <div class="footer-link">Already a Catalyst? <a href="login.html">Login here</a></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script>
        // INIT FLAG PICKER WITH VISIBLE COUNTRY CODE
        const phoneInput = window.intlTelInput(document.querySelector("#phone"), {
            initialCountry: "ng",
            separateDialCode: true, // This makes the +234 visible like in your screenshot
            preferredCountries: ["ng", "gh", "us"],
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
        });

        function showWarn(id) { document.getElementById(id).style.display = 'block'; }
        function hideWarn(id) { document.getElementById(id).style.display = 'none'; }

        // EYE ICON TOGGLE LOGIC
        function togglePass(id, icon) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            }
        }

        document.getElementById('regForm').addEventListener('submit', function(e) {
            const pass = document.getElementById('pass').value;
            const confirm = document.getElementById('confirm_pass').value;
            const terms = document.getElementById('termsCheck');

            if (!terms.checked) {
                e.preventDefault();
                alert("Please agree to the Terms & Conditions to proceed.");
                return;
            }

            if (pass !== confirm) {
                e.preventDefault();
                alert("Passwords do not match!");
            }
        });
    </script>
<script>
    const userBox = document.getElementById('m-username');
    const msgArea = document.getElementById('user-gatekeeper-msg');
    // Grab all other inputs on the page to lock them
    const otherInputs = document.querySelectorAll('input:not(#m-username)');

    // Simulated database of taken names
    const takenNames = ["chidera", "mochearn", "admin", "catalyst", "jsystem"];

    // A. LIVE CLEANING: Clear errors as they type
    userBox.addEventListener('input', function() {
        msgArea.style.display = 'none';
        userBox.style.borderColor = '#ddd';
        // Unlock while typing so they don't feel "stuck"
        toggleForm(true); 
    });

    // B. THE STRICT VALIDATION (When they finish typing)
    userBox.addEventListener('blur', function() {
        const val = userBox.value.trim();
        
        if (val === "") return; // Don't show error if empty

        // 1. Check Length (At least 6)
        if (val.length < 6) {
            showError("❌ Too short! Must be 6 characters or more.");
            return;
        }

        // 2. Must Start with a Letter
        if (!/^[a-zA-Z]/.test(val)) {
            showError("❌ Must start with a letter (A-Z).");
            return;
        }

        // 3. Must have Letters AND Numbers
        const hasLetter = /[a-zA-Z]/.test(val);
        const hasNumber = /[0-9]/.test(val);
        if (!hasLetter || !hasNumber) {
            showError("❌ Mix it! Use both letters and numbers (e.g. Sam22).");
            return;
        }

        // 4. Availability Check
        if (takenNames.includes(val.toLowerCase())) {
            const suggest = val + Math.floor(Math.random() * 89 + 10);
            showError(`❌ Taken! Try <span id="suggest-click" style="text-decoration: underline; cursor: pointer; color: #0088cc;">${suggest}</span>`);
            
            document.getElementById('suggest-click').onclick = function() {
                userBox.value = suggest;
                showSuccess("✅ Available! Box Unlocked.");
            };
        } else {
            showSuccess("✅ Available! Box Unlocked.");
        }
    });

    // Function to lock/unlock the rest of the form
    function toggleForm(state) {
        otherInputs.forEach(input => {
            input.disabled = !state;
        });
    }

    function showError(text) {
        msgArea.style.display = 'block';
        msgArea.style.color = '#ff4444'; 
        msgArea.innerHTML = text;
        userBox.style.borderColor = '#ff4444';
        toggleForm(false); // Lock the form
    }

    function showSuccess(text) {
        msgArea.style.display = 'block';
        msgArea.style.color = '#27ae60'; 
        msgArea.innerHTML = text;
        userBox.style.borderColor = '#27ae60';
        toggleForm(true); // Unlock the form
    }
    </script>
</body>
    </html>
