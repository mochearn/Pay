<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Registration | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 20px 0; background-color: #00ff88; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .reg-card { background: #ffffff; width: 90%; max-width: 450px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; margin: 20px; }
        .logo-header { background: #050a18; padding: 25px; }
        .logo-placeholder { width: 120px; height: 30px; margin: 0 auto; border: 1px dashed #444; color: #555; display: flex; justify-content: center; align-items: center; font-size: 0.6rem; }
        .form-content { padding: 30px 25px; }

        h2 { font-weight: 600; font-size: 1.3rem; margin-bottom: 5px; text-transform: uppercase; background: linear-gradient(90deg, #050a18, #00ff88, #050a18); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s infinite linear; }
        @keyframes shimmer { 0% { background-position: -200%; } 100% { background-position: 200%; } }
        p.subtitle { color: #888; font-size: 0.65rem; margin-bottom: 25px; font-weight: 600; letter-spacing: 1px; }

        .section-label { text-align: left; font-size: 0.6rem; font-weight: 600; color: #00ff88; text-transform: uppercase; margin: 20px 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .input-group { text-align: left; margin-bottom: 12px; position: relative; }
        .input-group label { display: block; font-size: 0.7rem; margin-bottom: 5px; color: #666; }
        
        input, select { width: 100%; padding: 10px 35px 10px 12px; background: #fff; border: 1px solid #ddd; border-radius: 5px; color: #333; font-family: 'Montserrat', sans-serif; box-sizing: border-box; font-size: 0.8rem; }
        input:focus { outline: none; border-color: #00ff88; }

        /* SEARCHABLE BANK LIST */
        .bank-container { position: relative; }
        #bankList { position: absolute; width: 100%; background: white; border: 1px solid #ddd; border-radius: 5px; max-height: 200px; overflow-y: auto; z-index: 1000; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .bank-option { padding: 10px; font-size: 0.8rem; cursor: pointer; text-align: left; }
        .bank-option:hover { background: #f0fff8; color: #00ff88; }

        .status-icon { position: absolute; right: 12px; top: 32px; font-size: 0.75rem; color: #00ff88; visibility: hidden; }
        .iti { width: 100%; }
        .terms-box { display: flex; align-items: center; gap: 8px; font-size: 0.65rem; color: #777; margin: 20px 0; cursor: pointer; text-align: left; }
        .reg-btn { width: 100%; padding: 14px; background: #00ff88; color: #050a18; border: none; border-radius: 5px; font-weight: 600; text-transform: uppercase; cursor: pointer; font-size: 0.8rem; margin-top: 10px; }
        .footer-link { margin-top: 20px; font-size: 0.7rem; color: #888; }
        .footer-link a { color: #333; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="logo-header"><div class="logo-placeholder">YOUR LOGO HERE</div></div>

        <div class="form-content">
            <h2>Vendor Registration</h2>
            <p class="subtitle">ESTABLISH MERCHANT CREDENTIALS</p>

            <form id="vRegForm">
                <div class="section-label">Identity & Branding</div>
                <div class="input-group">
                    <label>Full Name (Official)</label>
                    <input type="text" id="officialName" placeholder="e.g. John Doe" onblur="validateField(this, 'c1'); syncName()" required>
                    <i id="c1" class="fa-solid fa-circle-check status-icon"></i>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" onblur="validateField(this, 'cPhone')" required>
                    <i id="cPhone" class="fa-solid fa-circle-check status-icon"></i>
                </div>
                <div class="v-input-group" style="margin-top: 25px; margin-bottom: 25px; text-align: left;">
    <label style="font-size: 14px; color: #666; display: block; margin-bottom: 4px; font-family: sans-serif; font-weight: 600;">Vendor Username (For your Link)</label>
    
    <span style="font-size: 11px; color: #999; display: block; margin-bottom: 8px; font-family: sans-serif;">
        * No spaces or symbols. Must include letters and numbers.
    </span>

    <div style="display: flex; align-items: center; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; background: #fff;">
        <span style="padding-left: 15px; font-weight: 800; color: #27ae60; font-family: sans-serif; background: #fff;">V_</span>
        
        <input type="text" id="v-username" name="v_username" placeholder="e.g. Store24" autocomplete="off" style="
            width: 100%; 
            padding: 15px 10px; 
            border: none; 
            font-size: 16px;
            color: #333;
            outline: none;
            font-family: sans-serif;
            background: #fff;">
    </div>
    
    <div id="v-gatekeeper-msg" style="font-size: 12px; margin-top: 8px; font-weight: 700; display: none; text-align: left;"></div>
                </div>
                <div class="input-group">
                    <label>Brand/Store Name</label>
                    <input type="text" placeholder="e.g. Mochearn Global" onblur="validateField(this, 'c2')" required>
                    <i id="c2" class="fa-solid fa-circle-check status-icon"></i>
                </div>
                <div class="input-group">
                    <label>Vendor ID (Choice)</label>
                    <input type="text" placeholder="VND-XXXX" onblur="validateField(this, 'c3')" required>
                    <i id="c3" class="fa-solid fa-circle-check status-icon"></i>
                </div>

                <div class="section-label">Financial Details</div>
                <div class="input-group bank-container">
                    <label>Bank Name</label>
                    <input type="text" id="bankInput" placeholder="Search your bank..." onfocus="fetchBanks()" onkeyup="filterBanks()" autocomplete="off">
                    <div id="bankList"></div>
                </div>
                <div class="input-group">
                    <label>Account Number</label>
                    <input type="number" id="accNum" placeholder="Loading format..." onblur="validateField(this, 'c4')" required>
                    <i id="c4" class="fa-solid fa-circle-check status-icon"></i>
                </div>
                <div class="input-group">
                    <label>Account Name</label>
                    <input type="text" id="accName" placeholder="Auto-fills from Name" onblur="validateField(this, 'c5')" required>
                    <i id="c5" class="fa-solid fa-circle-check status-icon"></i>
                </div>

                <div class="section-label">Security & Access</div>
                <div class="input-group">
                    <label>Business Email</label>
                    <input type="email" placeholder="merchant@mochearn.com" onblur="validateField(this, 'c6')" required>
                    <i id="c6" class="fa-solid fa-circle-check status-icon"></i>
                </div>
           <style>
    .v-pass-group { margin-top: 25px; text-align: left; font-family: sans-serif; }
    .v-label { font-size: 14px; color: #666; font-weight: 600; display: block; margin-bottom: 8px; }
    
    .v-input-wrapper { position: relative; display: flex; align-items: center; }
    
    .v-input {
        width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px;
        font-size: 16px; color: #333; outline: none; transition: border 0.3s;
    }

    .v-eye { position: absolute; right: 15px; cursor: pointer; width: 20px; opacity: 0.5; }

    /* The Checklist Box - Styled exactly like your Vendor inputs */
    .v-checklist {
        margin-top: 15px; padding: 15px; border: 1px solid #eee; border-radius: 10px; background: #fff;
    }

    .v-rule { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; color: #999; transition: 0.3s; }
    .v-rule:last-child { margin-bottom: 0; }

    .v-dot { 
        width: 14px; height: 14px; border: 1.5px solid #ccc; border-radius: 50%; 
        margin-right: 10px; display: flex; align-items: center; justify-content: center;
    }

    /* Active Rule State */
    .v-rule.valid { color: #27ae60; font-weight: 600; }
    .v-rule.valid .v-dot { border-color: #27ae60; background: #27ae60; }
</style>

<div class="v-pass-group">
    <label class="v-label">New Password</label>
    <div class="v-input-wrapper">
        <input type="password" id="v-pass-main" class="v-input" placeholder="Min. 10 characters">
        <img src="https://cdn-icons-png.flaticon.com/512/709/709612.png" id="eye-main" class="v-eye" onclick="toggleVPass('v-pass-main', 'eye-main')">
    </div>

    <div class="v-checklist">
        <div class="v-rule" id="rule-len"><span class="v-dot"></span> At least 10 Characters</div>
        <div class="v-rule" id="rule-let"><span class="v-dot"></span> 3 to 6 Letters</div>
        <div class="v-rule" id="rule-num"><span class="v-dot"></span> Includes Numbers</div>
        <div class="v-rule" id="rule-sym"><span class="v-dot"></span> Includes Symbols (@, #, $)</div>
    </div>
</div>

<div class="v-pass-group" style="margin-top: 20px;">
    <label class="v-label">Confirm Password</label>
    <div class="v-input-wrapper">
        <input type="password" id="v-pass-confirm" class="v-input" placeholder="Repeat new password" disabled>
        <img src="https://cdn-icons-png.flaticon.com/512/709/709612.png" id="eye-conf" class="v-eye" onclick="toggleVPass('v-pass-confirm', 'eye-conf')">
    </div>
    <div id="v-match-note" style="font-size: 12px; margin-top: 8px; font-weight: 700; display: none;"></div>
    </div>

                <label class="terms-box">
                    <input type="checkbox" required> I agree to the Mochearn Merchant Policies.
                </label>

                <button type="submit" class="reg-btn">Complete Setup</button>
            </form>

            <div class="footer-link">Have an ID? <a href="Vendors login.html">Login</a></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script>
        // Init International Phone
        const phoneInput = window.intlTelInput(document.querySelector("#phone"), {
            initialCountry: "ng",
            separateDialCode: true,
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
        });

        // "Wait-to-mark" logic
        function validateField(input, iconId) {
            const icon = document.getElementById(iconId);
            if (input.value.length > 2) { icon.style.visibility = 'visible'; }
            else { icon.style.visibility = 'hidden'; }
        }

        // Auto-fill Account Name
        function syncName() {
            const official = document.getElementById('officialName').value;
            const accNameInput = document.getElementById('accName');
            if(accNameInput.value === "") { accNameInput.value = official; }
        }

        // DYNAMIC BANK LOGIC (Global Search)
        async function fetchBanks() {
            const countryCode = phoneInput.getSelectedCountryData().iso2.toUpperCase();
            const listContainer = document.getElementById('bankList');
            listContainer.style.display = 'block';
            listContainer.innerHTML = '<div class="bank-item">Loading Banks...</div>';

            try {
                // In production, you'd call: `https://api.paystack.co/bank?country=${countryName}`
                // For this design, I'm simulating the massive global fetch
                const mockBanks = ["Access Bank", "First Bank", "GTBank", "Zenith", "Kuda", "Standard Chartered", "UBA", "Fidelity", "Union Bank", "Wema", "Opay", "Palmpay"];
                renderBankList(mockBanks);
            } catch (e) {
                listContainer.innerHTML = '<div class="bank-item">Error loading banks</div>';
            }
        }

        function renderBankList(banks) {
            const listContainer = document.getElementById('bankList');
            listContainer.innerHTML = banks.map(bank => `<div class="bank-option" onclick="selectBank('${bank}')">${bank}</div>`).join('');
        }

        function filterBanks() {
            let filter = document.getElementById('bankInput').value.toUpperCase();
            let options = document.getElementsByClassName('bank-option');
            for (let i = 0; i < options.length; i++) {
                if (options[i].innerHTML.toUpperCase().indexOf(filter) > -1) { options[i].style.display = ""; }
                else { options[i].style.display = "none"; }
            }
        }

        function selectBank(name) {
            document.getElementById('bankInput').value = name;
            document.getElementById('bankList').style.display = 'none';
        }
    </script>
    <script>
    const vBox = document.getElementById('v-username');
    const vMsg = document.getElementById('v-gatekeeper-msg');
    const vOtherInputs = document.querySelectorAll('input:not(#v-username)');

    // Simulated Vendor Database
    const takenVendors = ["v_chiderahub", "v_mochearnstore", "v_admin"];

    // 1. LIVE EMOJI & SPACE KILLER
    vBox.addEventListener('input', function() {
        const original = this.value;
        const clean = this.value.replace(/[^a-zA-Z0-9]/g, '');
        
        if (original !== clean) {
            this.value = clean;
            showVErr("❌ Symbols and spaces are not allowed!");
        } else {
            vMsg.style.display = 'none';
            vBox.parentElement.style.borderColor = '#ddd';
            toggleVForm(true); 
        }
    });

    // 2. VENDOR VALIDATION
    vBox.addEventListener('blur', function() {
        const rawVal = vBox.value.trim();
        const fullVal = "v_" + rawVal.toLowerCase();
        
        if (rawVal === "") return;

        // Rule: Start with Letter
        if (!/^[a-zA-Z]/.test(rawVal)) {
            showVErr("❌ Must start with a letter.");
            return;
        }

        // Rule: Letter + Number Mix
        const hasL = /[a-zA-Z]/.test(rawVal);
        const hasN = /[0-9]/.test(rawVal);
        if (!hasL || !hasN) {
            showVErr("❌ Use both letters and numbers.");
            return;
        }

        // Rule: Corporate Length (8-15)
        if (rawVal.length < 8 || rawVal.length > 15) {
            showVErr("❌ Vendor ID must be 8 to 15 characters.");
            return;
        }

        // Rule: Database Check
        if (takenVendors.includes(fullVal)) {
            const vSuggest = rawVal + Math.floor(Math.random() * 89 + 10);
            showVErr(`❌ Taken! Try <span id="v-suggest" style="text-decoration: underline; cursor: pointer; color: #0088cc;">${vSuggest}</span>`);
            
            document.getElementById('v-suggest').onclick = function() {
                vBox.value = vSuggest;
                showVSuccess("✅ Vendor ID Available!");
            };
        } else {
            showVSuccess("✅ Vendor ID Available!");
        }
    });

    function toggleVForm(state) {
        vOtherInputs.forEach(input => { input.disabled = !state; });
    }

    function showVErr(text) {
        vMsg.style.display = 'block';
        vMsg.style.color = '#ff4444'; 
        vMsg.innerHTML = text;
        vBox.parentElement.style.borderColor = '#ff4444';
        toggleVForm(false);
    }

    function showVSuccess(text) {
        vMsg.style.display = 'block';
        vMsg.style.color = '#27ae60'; 
        vMsg.innerHTML = text;
        vBox.parentElement.style.borderColor = '#27ae60';
        toggleVForm(true);
    }
    </script>
    <script>
    // 1. EYE TOGGLE LOGIC
    function toggleVPass(boxId, eyeId) {
        const box = document.getElementById(boxId);
        const eye = document.getElementById(eyeId);
        if (box.type === "password") {
            box.type = "text";
            eye.style.opacity = "1"; // Brighter when visible
        } else {
            box.type = "password";
            eye.style.opacity = "0.5";
        }
    }

    const mainPass = document.getElementById('v-pass-main');
    const confPass = document.getElementById('v-pass-confirm');
    const matchNote = document.getElementById('v-match-note');

    // 2. LIVE VALIDATION
    mainPass.addEventListener('input', function() {
        // Kill Emojis instantly
        this.value = this.value.replace(/[^\x00-\x7F]/g, "");
        
        const val = this.value;

        // Requirement Checks
        const isLen = val.length >= 10;
        const letterCount = (val.match(/[a-zA-Z]/g) || []).length;
        const isLetters = letterCount >= 3 && letterCount <= 6;
        const isNumbers = /[0-9]/.test(val);
        const isSymbols = /[!@#$%^&*(),.?":{}|<>]/.test(val);

        // Update Checklist UI
        updateRule('rule-len', isLen);
        updateRule('rule-let', isLetters);
        updateRule('rule-num', isNumbers);
        updateRule('rule-sym', isSymbols);

        // Unlock Confirm Box only if all 4 are true
        if (isLen && isLetters && isNumbers && isSymbols) {
            confPass.disabled = false;
            confPass.style.opacity = "1";
            confPass.style.cursor = "text";
        } else {
            confPass.disabled = true;
            confPass.style.opacity = "0.5";
            confPass.style.cursor = "not-allowed";
            confPass.value = ""; // Clear confirm if main becomes invalid
            matchNote.style.display = "none";
        }
    });

    // 3. CONFIRM MATCH LOGIC
    confPass.addEventListener('input', function() {
        if (this.value === mainPass.value) {
            matchNote.style.display = "block";
            matchNote.style.color = "#27ae60";
            matchNote.innerHTML = "✅ Passwords Match!";
            this.style.borderColor = "#27ae60";
        } else {
            matchNote.style.display = "block";
            matchNote.style.color = "#ff4444";
            matchNote.innerHTML = "❌ Passwords do not match";
            this.style.borderColor = "#ff4444";
        }
    });

    function updateRule(id, isValid) {
        const el = document.getElementById(id);
        if (isValid) {
            el.classList.add('valid');
            // Change dot to a small check icon look
            el.querySelector('.v-dot').innerHTML = '<span style="color:white; font-size:9px;">L</span>'; 
        } else {
            el.classList.remove('valid');
            el.querySelector('.v-dot').innerHTML = '';
        }
    }
    </script>
</body>
    </html>
