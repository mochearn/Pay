<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Registration | Mochearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 20px 0; background-color: #00ff88; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .reg-card { background: #ffffff; width: 90%; max-width: 450px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; margin: 20px; }
        .logo-header { background: #050a18; padding: 25px; }
        .logo-placeholder { width: 120px; height: 30px; margin: 0 auto; border: 1px dashed #444; color: #555; display: flex; justify-content: center; align-items: center; font-size: 0.6rem; }
        .form-content { padding: 30px 25px; }
        h2 { font-weight: 600; font-size: 1.3rem; margin-bottom: 5px; text-transform: uppercase; background: linear-gradient(90deg, #050a18, #00ff88, #050a18); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s infinite linear; }
        @keyframes shimmer { 0% { background-position: -200%; } 100% { background-position: 200%; } }
        .section-label { text-align: left; font-size: 0.6rem; font-weight: 600; color: #00ff88; text-transform: uppercase; margin: 20px 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .input-group { text-align: left; margin-bottom: 12px; position: relative; }
        .input-group label { display: block; font-size: 0.7rem; margin-bottom: 5px; color: #666; }
        input, select { width: 100%; padding: 10px 35px 10px 12px; background: #fff; border: 1px solid #ddd; border-radius: 5px; color: #333; font-family: 'Montserrat', sans-serif; box-sizing: border-box; font-size: 0.8rem; }
        input:focus { outline: none; border-color: #00ff88; }
        .status-icon { position: absolute; right: 12px; top: 32px; font-size: 0.75rem; color: #00ff88; visibility: hidden; }
        .reg-btn { width: 100%; padding: 14px; background: #00ff88; color: #050a18; border: none; border-radius: 5px; font-weight: 600; text-transform: uppercase; cursor: pointer; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="logo-header"><div class="logo-placeholder">YOUR LOGO HERE</div></div>
        <div class="form-content">
            <h2>Vendor Registration</h2>
            <form id="vRegForm">
                <div class="section-label">Identity & Branding</div>
                <div class="input-group">
                    <label>Full Name (Official)</label>
                    <input type="text" id="officialName" placeholder="e.g. John Doe" onblur="validateField(this, 'c1'); syncName()" required>
                    <i id="c1" class="fa-solid fa-circle-check status-icon"></i>
                </div>

                <div class="section-label">Financial Details (Global)</div>
                <div class="input-group">
                    <label>Select Country</label>
                    <select id="countrySelect" onchange="updateFinancials()">
                        <option value="NG">Nigeria 🇳🇬</option>
                        <option value="GH">Ghana 🇬🇭</option>
                        <option value="US">USA 🇺🇸</option>
                        <option value="UK">United Kingdom 🇬🇧</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Account Number</label>
                    <input type="text" id="accNum" placeholder="10-digit Account Number" onblur="validateField(this, 'c4')" required>
                    <i id="c4" class="fa-solid fa-circle-check status-icon"></i>
                </div>
                <div class="input-group">
                    <label>Account Name</label>
                    <input type="text" id="accName" placeholder="Bank Account Name" onblur="validateField(this, 'c5')" required>
                    <i id="c5" class="fa-solid fa-circle-check status-icon"></i>
                </div>

                <button type="submit" class="reg-btn">Complete Registration</button>
            </form>
        </div>
    </div>

    <script>
        // Only mark green after they leave the box (onblur)
        function validateField(input, iconId) {
            const icon = document.getElementById(iconId);
            if (input.value.length > 2) {
                icon.style.visibility = 'visible';
            } else {
                icon.style.visibility = 'hidden';
            }
        }

        // Sync Official Name to Account Name automatically
        function syncName() {
            const official = document.getElementById('officialName').value;
            const accNameInput = document.getElementById('accName');
            if(accNameInput.value === "") {
                accNameInput.value = official;
            }
        }

        // Update placeholders based on country
        function updateFinancials() {
            const country = document.getElementById('countrySelect').value;
            const accNum = document.getElementById('accNum');
            
            if (country === "NG") accNum.placeholder = "10-digit NUBAN Number";
            else if (country === "GH") accNum.placeholder = "Account or Wallet Number";
            else if (country === "US") accNum.placeholder = "Routing & Account Number";
            else accNum.placeholder = "Enter International Account Number";
        }
    </script>
</body>
        </html>
