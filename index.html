<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOCHEARN | Official website</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #020617; color: white; overflow-x: hidden; text-align: center; }
        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        /* Text Logo - Scaled for Mobile */
        .logo { 
            margin-top: 40px; 
            font-size: clamp(2.5rem, 10vw, 4.5rem); 
            font-weight: 900; 
            letter-spacing: 4px; 
            background: linear-gradient(to right, #fff, #00BFFF, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .hero { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        /* Heading - Scaled for Mobile */
        h1 { 
            font-size: clamp(1.5rem, 6vw, 2.5rem); 
            margin-bottom: 40px; 
            font-weight: 800; 
            letter-spacing: -1px; 
            line-height: 1.2;
        }

        /* The Moving Slider */
        .slider-wrapper {
            width: 100%;
            overflow: hidden;
            position: relative;
            padding: 20px 0;
        }

        .slider-track {
            display: flex;
            width: max-content;
            /* Speed slowed down significantly for readability */
            animation: scroll 150s linear infinite; 
        }

        .quote-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 20px;
            margin: 0 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: clamp(280px, 80vw, 450px); /* Adjusts width based on screen */
        }

        .quote-card img {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            margin-right: 15px;
            border: 2px solid #00BFFF;
            object-fit: cover;
        }

        .quote-text { text-align: left; white-space: normal; }
        .quote-text p { font-size: 0.9rem; font-style: italic; color: #e2e8f0; line-height: 1.4; margin-bottom: 5px; }
        .quote-text b { font-size: 0.9rem; color: #00BFFF; text-transform: uppercase; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Stop animation on touch so people can read better if they hold it */
        .slider-wrapper:active .slider-track {
            animation-play-state: paused;
        }
    </style>
</head>
<body>
<canvas id="starCanvas"></canvas>

<div class="logo">MOCHEARN</div>

<section class="hero">
    <h1>WELCOME TO THE FUTURE</h1>

    <div class="slider-wrapper">
        <div class="slider-track" id="quoteTrack">
            </div>
    </div>
</section>

<script>
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, speed: Math.random() * 0.4 + 0.1 });
        }
    }
    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        stars.forEach(star => {
            ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
            star.y -= star.speed; if (star.y < 0) star.y = canvas.height;
        });
        requestAnimationFrame(animateStars);
    }

    const quotes = [
        { name: "Dan Kennedy", text: "The only way to predict the future is to build it yourself.", img: "https://images.unsplash.com/photo-1560250097-0b93528c311a?w=400" },
        { name: "Gary Halbert", text: "Marketing is not about tools, it is about deep human connection.", img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400" },
        { name: "Grant Cardone", text: "Success is your duty, obligation, and responsibility.", img: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=400" },
        { name: "Seth Godin", text: "Be the purple cow in a field of brown cows.", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400" },
        { name: "David Ogilvy", text: "The consumer is not a moron; she is your wife.", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400" }
    ];

    function fillQuotes() {
        const track = document.getElementById('quoteTrack');
        let content = "";
        // We repeat the set to make the loop look infinite
        for (let i = 0; i < 20; i++) { 
            quotes.forEach(q => {
                content += `
                    <div class="quote-card">
                        <img src="${q.img}" alt="${q.name}">
                        <div class="quote-text">
                            <p>"${q.text}"</p>
                            <b>— ${q.name}</b>
                        </div>
                    </div>`;
            });
        }
        track.innerHTML = content + content;
    }

    window.addEventListener('resize', initStars);
    initStars(); animateStars(); fillQuotes();
</script>
</body>
    </html>
