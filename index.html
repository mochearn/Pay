<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochearn | Official Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #020617; color: white; overflow-x: hidden; }
        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px 20px; border-radius: 40px; max-width: 550px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 2.8rem; font-weight: 900; background: linear-gradient(to bottom, #ffffff, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; letter-spacing: -1px; }
        p { color: #94a3b8; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
        .cta-btn { background: #00BFFF; color: #020617; text-decoration: none; padding: 16px 30px; border-radius: 50px; font-weight: 800; font-size: 0.9rem; transition: 0.3s; display: inline-block; }
        .cta-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 191, 255, 0.3); }
    </style>
</head>
<body>
<canvas id="starCanvas"></canvas>
<section class="hero">
    <div class="glass-card">
        <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; color: #00BFFF; font-weight: bold;">Mochearn Ecosystem 🦅</p>
        <h1>WELCOME TO THE FUTURE</h1>
        <p>Step into the elite circle of the Billionaire Brotherhood. We build the systems, you reap the rewards.</p>
        <a href="pay.html" class="cta-btn">ENTER THE PORTAL</a>
    </div>
</section>
<script>
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, speed: Math.random() * 0.4 + 0.1 });
        }
    }
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        stars.forEach(star => {
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
            star.y -= star.speed;
            if (star.y < 0) star.y = canvas.height;
        });
        requestAnimationFrame(animate);
    }
    window.addEventListener('resize', init);
    init(); animate();
</script>
</body>
  </html>
