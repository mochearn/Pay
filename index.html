here<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOCHEARN | Official Website</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #020617; color: white; overflow-x: hidden; text-align: center; }
        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        /* Elite Text Logo */
        .logo-container { margin-top: 50px; margin-bottom: 40px; }
        .logo { 
            font-size: clamp(2.5rem, 10vw, 4.5rem); 
            font-weight: 900; 
            letter-spacing: 6px; 
            background: linear-gradient(to right, #fff, #00BFFF, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            line-height: 1;
        }
        .subtitle {
            font-size: clamp(0.7rem, 3vw, 1rem);
            color: #00BFFF;
            letter-spacing: 5px;
            font-weight: 800;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .hero { min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        h1 { 
            font-size: clamp(1.4rem, 5vw, 2.2rem); 
            margin-bottom: 30px; 
            font-weight: 800; 
            letter-spacing: -1px;
            opacity: 0.8;
        }

        /* Fixed JavaScript Slider Wrapper */
        .slider-wrapper {
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            position: relative;
            margin: 0 auto;
            display: flex;
            justify-content: center;
        }

        .slider-track {
            display: flex;
            transition: transform 1.2s cubic-bezier(0.45, 0, 0.55, 1); /* Smooth sliding effect */
            width: max-content;
        }

        .quote-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: clamp(300px, 90vw, 480px);
            margin: 0 10px; /* Space between cards */
            flex-shrink: 0;
        }

        .quote-card img {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            margin-right: 20px;
            border: 2px solid #00BFFF;
            object-fit: cover;
        }

        .quote-text { text-align: left; white-space: normal; }
        .quote-text p { font-size: 1rem; font-style: italic; color: #e2e8f0; line-height: 1.5; margin-bottom: 8px; }
        .quote-text b { font-size: 0.9rem; color: #00BFFF; text-transform: uppercase; letter-spacing: 1px; }

    </style>
</head>
<body>
<canvas id="starCanvas"></canvas>

<div class="logo-container">
    <div class="logo">MOCHEARN</div>
    <div class="subtitle">ECOSYSTEM</div>
</div>

<section class="hero">
    <h1>WELCOME TO THE FUTURE</h1>

    <div class="slider-wrapper">
        <div class="slider-track" id="quoteTrack">
            </div>
    </div>
</section>

<script>
    // --- STAR BACKGROUND LOGIC ---
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, speed: Math.random() * 0.4 + 0.1 });
        }
    }
    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        stars.forEach(star => {
            ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
            star.y -= star.speed; if (star.y < 0) star.y = canvas.height;
        });
        requestAnimationFrame(animateStars);
    }

    // --- ELITE QUOTES DATA ---
    const quotes = [
        { name: "Dan Kennedy", text: "The only way to predict the future is to build it yourself.", img: "https://images.unsplash.com/photo-1560250097-0b93528c311a?w=400" },
        { name: "Gary Halbert", text: "Marketing is not about tools, it is about deep human connection.", img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400" },
        { name: "Grant Cardone", text: "Success is your duty, obligation, and responsibility.", img: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=400" },
        { name: "Seth Godin", text: "Be the purple cow in a field of brown cows.", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400" },
        { name: "David Ogilvy", text: "The consumer is not a moron; she is your wife.", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400" }
    ];

    // --- SMART SLIDER LOGIC ---
    const track = document.getElementById('quoteTrack');
    let currentIndex = 0;

    function fillQuotes() {
        let content = "";
        quotes.forEach(q => {
            content += `
                <div class="quote-card">
                    <img src="${q.img}" alt="${q.name}">
                    <div class="quote-text">
                        <p>"${q.text}"</p>
                        <b>— ${q.name}</b>
                    </div>
                </div>`;
        });
        track.innerHTML = content;
    }

    function slideQuotes() {
        currentIndex++;
        if (currentIndex >= quotes.length) {
            currentIndex = 0; // Loop back to start
        }
        
        // Calculate the exact width to move (card + margin)
        const cardWidth = document.querySelector('.quote-card').offsetWidth + 20; 
        track.style.transform = `translateX(-${currentIndex * cardWidth}px)`;
    }

    // Initialize everything
    window.addEventListener('resize', initStars);
    initStars(); 
    animateStars(); 
    fillQuotes();

    // Set the 8-second timer for the slide
    setInterval(slideQuotes, 8000); 

</script>
</body>
    </html>
